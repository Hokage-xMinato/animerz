<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Minimal M3U8 Player</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <style>
    body {
      margin: 0;
      background: black;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    video {
      width: 90%;
      max-width: 1000px;
      height: auto;
    }
  </style>
</head>
<body>

<video id="video" controls></video>

<script>
const params = new URLSearchParams(window.location.search);
const videoSrc = params.get("url");
const subUrls = params.getAll("sub");
const subNames = params.getAll("name");
const video = document.getElementById("video");

if (!videoSrc) {
  alert("No ?url= parameter provided");
  throw new Error("Missing url parameter");
}

/* ---------- Add Subtitles (Simple, No crossOrigin) ---------- */
subUrls.forEach((url, index) => {
  const track = document.createElement("track");
  track.kind = "subtitles";
  track.label = subNames[index] || `Subtitle ${index + 1}`;
  track.src = url;
  track.srclang = "en";
  video.appendChild(track);
});

/* ---------- HLS Playback (Same as your working version) ---------- */
if (Hls.isSupported()) {
  const hls = new Hls();
  hls.loadSource(videoSrc);
  hls.attachMedia(video);
} else if (video.canPlayType("application/vnd.apple.mpegurl")) {
  video.src = videoSrc;
} else {
  alert("HLS not supported in this browser.");
}
</script>

</body>
</html>
