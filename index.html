<!DOCTYPE html>
<html>
<head>
    <title>Minimal M3U8 Player</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }
        video { width: 100%; height: 100%; }
    </style>
</head>
<body>

<video id="video" controls></video>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script>
    const video = document.getElementById('video');
    const params = new URLSearchParams(window.location.search);
    const streamUrl = params.get('url');
    const subUrls = params.getAll('sub');
    const subNames = params.getAll('name');

    // 1. Add Subtitles
    subUrls.forEach((url, index) => {
        const track = document.createElement('track');
        track.kind = 'subtitles';
        track.label = subNames[index] || `Subtitle ${index + 1}`;
        track.src = url;
        track.srclang = 'en'; // Default lang code
        video.appendChild(track);
    });

    // 2. Initialize HLS or Native Playback
    if (streamUrl) {
        if (Hls.isSupported()) {
            const hls = new Hls();
            hls.loadSource(streamUrl);
            hls.attachMedia(video);
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            // For Safari (Native HLS support)
            video.src = streamUrl;
        }
    } else {
        alert("Please provide a ?url= parameter");
    }
</script>
</body>
</html>
