<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Simple M3U8 Player</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <style>
    body {
      margin: 0;
      background: black;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    video {
      width: 90%;
      max-width: 1000px;
      height: auto;
    }
  </style>
</head>
<body>

<video id="video" controls autoplay></video>

<script>
  const params = new URLSearchParams(window.location.search);
  const videoSrc = params.get("url");
  
  // New parameters for subtitles
  const subsParam = params.get("subs");  
  const namesParam = params.get("names"); 

  const video = document.getElementById("video");

  if (!videoSrc) {
    alert("No ?url= parameter provided");
    throw new Error("Missing url parameter");
  }

  // --- SUBTITLE INJECTION ---
  if (subsParam) {
    const urls = subsParam.split(",");
    const names = namesParam ? namesParam.split(",") : [];

    urls.forEach((url, index) => {
      const track = document.createElement("track");
      track.kind = "subtitles";
      track.label = names[index] || `Subtitle ${index + 1}`;
      track.src = url;
      track.srclang = "en";
      // To auto-show the first subtitle, uncomment the line below:
      // if (index === 0) track.default = true; 
      video.appendChild(track);
    });
  }

  // --- YOUR ORIGINAL WORKING LOGIC ---
  if (video.canPlayType('application/vnd.apple.mpegurl')) {
    // Safari native HLS
    video.src = videoSrc;
  } else if (Hls.isSupported()) {
    // Other browsers
    const hls = new Hls();
    hls.loadSource(videoSrc);
    hls.attachMedia(video);
  } else {
    alert("HLS not supported in this browser.");
  }
</script>

</body>
</html>
