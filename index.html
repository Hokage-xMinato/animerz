<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>Animerz</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}

:root{
  --gold:#F0C040;
  --gold2:#FFD700;
  --gold-glow:rgba(240,192,64,.22);
  --bg:#07070a;
  --surf:rgba(255,255,255,.04);
  --surf2:rgba(255,255,255,.08);
  --surf3:rgba(255,255,255,.13);
  --bdr:rgba(255,255,255,.09);
  --bdr2:rgba(255,255,255,.15);
  --txt:#F4F4F4;
  --mid:rgba(244,244,244,.55);
  --dim:rgba(244,244,244,.28);
  --intro:#3ECFCB;
  --outro:#E8507A;
  --fn:'Syne',sans-serif;
  --mono:'DM Mono',monospace;
  --ease:cubic-bezier(.4,0,.2,1);
  --spring:cubic-bezier(.34,1.56,.64,1);
  --radius:10px;
}

html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:var(--fn);color:var(--txt);touch-action:none;}

/* ── INVALID ── */
#invalid{display:none;position:fixed;inset:0;z-index:9999;background:var(--bg);flex-direction:column;align-items:center;justify-content:center;gap:20px;text-align:center;padding:40px;}
#invalid.show{display:flex}
.inv-ic{width:72px;height:72px;border-radius:18px;background:rgba(232,80,80,.1);border:1px solid rgba(232,80,80,.25);display:flex;align-items:center;justify-content:center;}
.inv-ic svg{width:32px;height:32px;stroke:#E85050;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
#invalid h1{font-size:clamp(18px,4vw,26px);font-weight:700;letter-spacing:-.03em}
#invalid p{font-size:14px;color:var(--mid);max-width:300px;line-height:1.7}

/* ── SHELL ── */
#shell{position:fixed;inset:0;background:#000;display:flex;align-items:center;justify-content:center;overflow:hidden;cursor:none;user-select:none;}
#shell.cur{cursor:default}

video{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;pointer-events:none;}

/* ── GRADIENT ── */
#grad{
  position:absolute;inset:0;
  background:linear-gradient(to bottom,
    rgba(0,0,0,.6) 0%,
    transparent 20%,
    transparent 52%,
    rgba(0,0,0,.5) 72%,
    rgba(0,0,0,.88) 100%);
  pointer-events:none;opacity:0;
  transition:opacity .3s var(--ease);z-index:1;
}
#grad.on{opacity:1}

/* ── TAP ZONES ── */
.tz{position:absolute;top:0;bottom:0;width:38%;z-index:4;}
#tz-l{left:0}#tz-r{right:0}

/* ── SEEK FLASH ── */
.seek-flash{position:absolute;top:0;bottom:0;width:38%;z-index:5;pointer-events:none;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .2s;}
#sf-l{left:0;background:radial-gradient(ellipse at 25% 50%,rgba(255,255,255,.1) 0%,transparent 65%)}
#sf-r{right:0;background:radial-gradient(ellipse at 75% 50%,rgba(255,255,255,.1) 0%,transparent 65%)}
.seek-flash.show{opacity:1}
.seek-flash svg{width:24px;height:24px;stroke:rgba(255,255,255,.8);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

/* ── SPINNER ── */
#spin{position:absolute;top:50%;left:50%;z-index:10;transform:translate(-50%,-50%);width:44px;height:44px;border-radius:50%;border:2px solid rgba(255,255,255,.06);border-top-color:var(--gold);animation:rot .65s linear infinite;display:none;pointer-events:none;}
@keyframes rot{to{transform:translate(-50%,-50%) rotate(360deg)}}

/* ── CENTER FLASH (no background circle) ── */
#cf{position:absolute;top:50%;left:50%;z-index:8;transform:translate(-50%,-50%) scale(0);display:flex;align-items:center;justify-content:center;pointer-events:none;opacity:0;transition:transform .12s var(--spring),opacity .22s var(--ease);}
#cf svg{width:52px;height:52px;stroke:#fff;fill:rgba(255,255,255,.12);stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;filter:drop-shadow(0 0 16px rgba(255,255,255,.3));transition:fill .15s;}
#cf.pop{opacity:1;transform:translate(-50%,-50%) scale(1)}

/* ── SKIP BTN ── */
#skip-btn{position:absolute;z-index:20;right:clamp(14px,4vw,32px);bottom:clamp(88px,16vh,132px);background:rgba(10,10,14,.85);border:1.5px solid var(--gold);color:var(--gold);font-family:var(--fn);font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;padding:9px 20px;border-radius:6px;cursor:pointer;display:none;backdrop-filter:blur(14px);transition:background .15s,color .15s,transform .12s,box-shadow .15s;}
#skip-btn:hover,#skip-btn:active{background:var(--gold);color:#000;transform:scale(1.03);box-shadow:0 0 20px var(--gold-glow)}

/* ── CAPTIONS ── */
#cap{position:absolute;z-index:15;bottom:clamp(82px,14vh,120px);left:50%;transform:translateX(-50%);text-align:center;font-family:var(--fn);font-size:clamp(13px,2.2vw,20px);font-weight:500;line-height:1.55;color:#fff;text-shadow:0 1px 6px rgba(0,0,0,1),0 2px 16px rgba(0,0,0,.8);padding:5px 16px 6px;background:rgba(0,0,0,.65);border-radius:6px;max-width:min(82%,640px);pointer-events:none;display:none;backdrop-filter:blur(4px);}

/* ── KBD FLASH ── */
#kf{position:absolute;top:22px;left:50%;transform:translateX(-50%);z-index:30;background:rgba(10,10,14,.92);border:1px solid var(--bdr2);color:var(--txt);font-family:var(--mono);font-size:11px;padding:5px 14px;border-radius:6px;backdrop-filter:blur(12px);white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .2s;letter-spacing:.04em;}
#kf.on{opacity:1}

/* ── CONTROLS WRAP ── */
#cw{position:absolute;left:0;right:0;bottom:0;z-index:20;padding:0 clamp(14px,3vw,28px) clamp(12px,env(safe-area-inset-bottom,0px)+12px,26px);display:flex;flex-direction:column;gap:4px;pointer-events:none;opacity:0;transition:opacity .3s var(--ease);}
#cw.active{pointer-events:all;opacity:1}

/* ── PROGRESS ── */
#pw{position:relative;height:28px;display:flex;align-items:center;cursor:pointer;padding:9px 0;touch-action:none;}
#pr{position:relative;width:100%;height:3px;background:rgba(255,255,255,.18);border-radius:99px;transition:height .2s var(--ease);}
#pw:hover #pr,#pw.drag #pr{height:5px}

#pb{position:absolute;top:0;left:0;height:100%;background:rgba(255,255,255,.22);border-radius:99px;pointer-events:none;width:0;}
#pf{position:absolute;top:0;left:0;height:100%;background:linear-gradient(90deg,var(--gold),var(--gold2));border-radius:99px;pointer-events:none;width:0;}

#pt{position:absolute;top:50%;width:13px;height:13px;border-radius:50%;background:#fff;transform:translate(-50%,-50%) scale(0);pointer-events:none;transition:transform .15s var(--spring);box-shadow:0 0 0 3px rgba(240,192,64,.35),0 2px 8px rgba(0,0,0,.5);z-index:3;left:0;}
#pw:hover #pt,#pw.drag #pt{transform:translate(-50%,-50%) scale(1)}

.seg{position:absolute;top:0;height:100%;border-radius:99px;pointer-events:none;z-index:2}
.seg.intro{background:var(--intro);opacity:.75}
.seg.outro{background:var(--outro);opacity:.75}

.sl{position:absolute;bottom:calc(100% + 8px);transform:translateX(-50%);font-size:8.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:2px 6px;border-radius:3px;pointer-events:none;white-space:nowrap;opacity:0;transition:opacity .18s;z-index:5;}
#pw:hover .sl{opacity:1}
.sl.intro{background:var(--intro);color:#091818}
.sl.outro{background:var(--outro);color:#fff}

#ptip{position:absolute;bottom:calc(100% + 12px);transform:translateX(-50%);background:rgba(8,8,12,.96);border:1px solid var(--bdr2);color:#fff;font-family:var(--mono);font-size:10px;padding:3px 10px;border-radius:5px;pointer-events:none;opacity:0;white-space:nowrap;transition:opacity .12s;z-index:10;backdrop-filter:blur(8px);left:0;}
#pw:hover #ptip{opacity:1}

/* ── BUTTON ROW ── */
#row{display:flex;align-items:center;gap:1px;height:44px}

.btn{background:none;border:none;color:var(--txt);cursor:pointer;width:38px;height:38px;border-radius:7px;display:flex;align-items:center;justify-content:center;transition:background .13s,color .13s,transform .1s;flex-shrink:0;position:relative;}
.btn:hover{background:var(--surf2);color:#fff}
.btn:active{transform:scale(.82)}
.btn.lit{color:var(--gold)}
.btn svg{width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round;pointer-events:none}
#bp svg{width:20px;height:20px}

.seek-btn{background:none;border:none;color:var(--txt);cursor:pointer;width:40px;height:38px;border-radius:7px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;transition:background .13s,color .13s,transform .1s;flex-shrink:0;}
.seek-btn:hover{background:var(--surf2);color:#fff}
.seek-btn:active{transform:scale(.82)}
.seek-btn svg{width:15px;height:15px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.seek-btn span{font-family:var(--mono);font-size:8px;font-weight:400;letter-spacing:.05em;color:var(--mid);line-height:1}

#tt{font-family:var(--mono);font-size:10.5px;color:var(--mid);letter-spacing:.04em;margin-left:4px;white-space:nowrap;user-select:none}
#sp{flex:1}

/* ── SETTINGS PANEL ── */
#settings-panel{
  position:fixed;
  width:260px;
  background:rgba(9,9,14,.97);
  border:1px solid var(--bdr);
  border-radius:var(--radius);
  backdrop-filter:blur(30px);
  z-index:50;
  box-shadow:0 24px 64px rgba(0,0,0,.9),0 0 0 .5px rgba(255,255,255,.04);
  display:none;overflow:hidden;
  animation:pi .18s var(--spring);
}
#settings-panel.open{display:block}
@keyframes pi{from{opacity:0;transform:translateY(8px) scale(.95)}to{opacity:1;transform:translateY(0) scale(1)}}

/* Settings nav tabs */
#snav{
  display:flex;border-bottom:1px solid var(--bdr);
  background:rgba(255,255,255,.02);
}
.stab{
  flex:1;padding:9px 4px 8px;text-align:center;cursor:pointer;
  font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  color:var(--dim);border-bottom:2px solid transparent;
  transition:color .15s,border-color .15s;margin-bottom:-1px;
  display:flex;flex-direction:column;align-items:center;gap:3px;
}
.stab svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.stab:hover{color:var(--mid)}
.stab.active{color:var(--gold);border-bottom-color:var(--gold)}

/* Settings sections */
.ssect{display:none;flex-direction:column;gap:0;padding:4px 0;}
.ssect.active{display:flex}

.srow{display:flex;align-items:center;justify-content:space-between;padding:7px 12px;border-radius:7px;cursor:pointer;font-size:12.5px;gap:8px;transition:background .12s;font-family:var(--fn);}
.srow:hover{background:var(--surf2)}
.srow.on{color:var(--gold)}
.srow .dot{width:5px;height:5px;border-radius:50%;background:var(--gold);flex-shrink:0;opacity:0;transition:opacity .12s}
.srow.on .dot{opacity:1}
.srow .srow-sub{font-size:10px;color:var(--dim);margin-left:5px}
.qual-badge{background:var(--gold);color:#000;font-size:8px;font-weight:800;letter-spacing:.08em;padding:1px 5px;border-radius:3px;margin-left:6px;color:#1a1000 !important;vertical-align:middle}

.sscroll{max-height:160px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.08) transparent;padding:0 4px;}

/* Toggle */
.tog{position:relative;width:30px;height:16px;flex-shrink:0}
.tog input{opacity:0;width:0;height:0}
.togt{position:absolute;inset:0;border-radius:99px;background:rgba(255,255,255,.15);cursor:pointer;transition:background .18s}
.tog input:checked+.togt{background:var(--gold)}
.togk{position:absolute;top:2px;left:2px;width:12px;height:12px;border-radius:50%;background:#fff;transition:left .18s var(--ease);pointer-events:none}
.tog input:checked~.togk{left:16px}

.sact-btn{display:flex;align-items:center;gap:8px;padding:7px 12px;border-radius:7px;cursor:pointer;font-size:12.5px;transition:background .12s;color:var(--txt);}
.sact-btn:hover{background:var(--surf2)}
.sact-btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}

/* Mobile */
@media(max-width:480px){
  .btn{width:32px;height:32px}.btn svg{width:16px;height:16px}
  #bp svg{width:18px;height:18px}
  #tt{font-size:9.5px;margin-left:2px}
  .seek-btn{width:34px}.seek-btn svg{width:13px;height:13px}
  #cw{padding:0 10px clamp(12px,env(safe-area-inset-bottom,0px)+10px,20px)}
  #skip-btn{right:12px;font-size:10px;padding:7px 13px}
  #settings-panel{width:230px}
}
@media(max-height:380px){
  #cw{gap:2px;padding-bottom:8px}
  #row{height:36px}
  .btn{width:30px;height:30px}
  .seek-btn{height:30px}
}
</style>
</head>
<body>

<!-- Invalid -->
<div id="invalid">
  <div class="inv-ic">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
  </div>
  <h1>Invalid Token</h1>
  <p id="inv-msg">No token was provided, or it could not be decrypted. Please generate a valid token.</p>
</div>

<!-- Player -->
<div id="shell" style="display:none">
  <video id="vid" playsinline preload="auto"></video>

  <div class="tz" id="tz-l"></div>
  <div class="tz" id="tz-r"></div>

  <div class="seek-flash" id="sf-l">
    <svg viewBox="0 0 24 24"><polyline points="1,4 1,10 7,10"/><path d="M3.51 15a9 9 0 1 0 .49-3.41"/></svg>
  </div>
  <div class="seek-flash" id="sf-r">
    <svg viewBox="0 0 24 24"><polyline points="23,4 23,10 17,10"/><path d="M20.49 15a9 9 0 1 1-.49-3.41"/></svg>
  </div>

  <div id="grad"></div>
  <div id="spin"></div>
  <div id="cf">
    <svg id="cfi" viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>
  </div>
  <div id="cap"></div>
  <button id="skip-btn">Skip Intro →</button>
  <div id="kf"></div>

  <!-- Settings Panel (outside controls so fullscreen positioning works) -->
  <div id="settings-panel">
    <!-- Tabs -->
    <div id="snav">
      <div class="stab active" data-tab="quality">
        <svg viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" rx="3"/><path d="M7 12h10M12 7v10"/></svg>
        Quality
      </div>
      <div class="stab" data-tab="speed">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><polyline points="12,6 12,12 16,14"/></svg>
        Speed
      </div>
      <div class="stab" data-tab="captions">
        <svg viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="3"/><line x1="6" y1="10" x2="18" y2="10"/><line x1="6" y1="14" x2="13" y2="14"/></svg>
        Subs
      </div>
      <div class="stab" data-tab="more">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="5" r="1.5" fill="currentColor" stroke="none"/><circle cx="12" cy="12" r="1.5" fill="currentColor" stroke="none"/><circle cx="12" cy="19" r="1.5" fill="currentColor" stroke="none"/></svg>
        More
      </div>
    </div>

    <!-- Quality -->
    <div class="ssect active" id="sect-quality">
      <div class="sscroll" id="ql"></div>
    </div>

    <!-- Speed -->
    <div class="ssect" id="sect-speed">
      <div class="sscroll" id="spl"></div>
    </div>

    <!-- Captions -->
    <div class="ssect" id="sect-captions">
      <div class="sscroll" id="cl">
        <div class="srow on" data-track="-1"><span>Off</span><div class="dot"></div></div>
      </div>
    </div>

    <!-- More -->
    <div class="ssect" id="sect-more">
      <div class="sact-btn" id="rpip">
        <svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><rect x="12" y="10" width="9" height="7" rx="1"/></svg>
        Picture in Picture
      </div>
      <div style="padding:4px 8px">
        <div class="srow" id="rsi" style="cursor:default">
          <span>Auto-skip Intro</span>
          <label class="tog"><input type="checkbox" id="csi" checked><div class="togt"></div><div class="togk"></div></label>
        </div>
        <div class="srow" id="rso" style="cursor:default">
          <span>Auto-skip Outro</span>
          <label class="tog"><input type="checkbox" id="cso"><div class="togt"></div><div class="togk"></div></label>
        </div>
      </div>
    </div>
  </div>

  <!-- Controls -->
  <div id="cw">
    <div id="pw">
      <div id="ptip">0:00</div>
      <div id="pr">
        <div id="pb"></div>
        <div id="pf"></div>
        <div id="pt"></div>
      </div>
    </div>
    <div id="row">
      <!-- Play/Pause -->
      <button class="btn" id="bp" title="Play / Pause  [Space / K]">
        <svg id="icp" viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21" fill="currentColor" stroke="none"/></svg>
      </button>
      <!-- Rewind -->
      <button class="seek-btn" id="brw" title="Rewind 10s  [J / ←]">
        <svg viewBox="0 0 24 24"><path d="M12 5V2L7 7l5 5V8a7 7 0 1 1-7 7"/></svg>
        <span>10s</span>
      </button>
      <!-- Forward -->
      <button class="seek-btn" id="bff" title="Forward 10s  [L / →]">
        <svg viewBox="0 0 24 24"><path d="M12 5V2l5 5-5 5V8a7 7 0 1 0 7 7"/></svg>
        <span>10s</span>
      </button>
      <!-- Mute -->
      <button class="btn" id="bm" title="Mute  [M]">
        <svg viewBox="0 0 24 24">
          <polygon id="vp" points="11,5 6,9 2,9 2,15 6,15 11,19" fill="currentColor" stroke="none"/>
          <path id="vw" d="M15.54 8.46a5 5 0 0 1 0 7.07M19.07 4.93a10 10 0 0 1 0 14.14"/>
        </svg>
      </button>
      <span id="tt">0:00 / 0:00</span>
      <div id="sp"></div>
      <!-- Settings -->
      <button class="btn" id="bs" title="Settings  [S]">
        <svg viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
      <!-- Fullscreen -->
      <button class="btn" id="bfs" title="Fullscreen  [F]">
        <svg id="ifs" viewBox="0 0 24 24">
          <polyline points="15,3 21,3 21,9"/><polyline points="9,21 3,21 3,15"/>
          <line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/>
        </svg>
      </button>
    </div>
  </div>
</div>

<script>
// ─── CRYPTO ───────────────────────────────────────
const KEY_HEX='a3f8c2e1b4d7f6a0c9e2b5d8f1a4c7e0b3d6f9a2c5e8b1d4f7a0c3e6b9d2f5a8';
const h2b=h=>{const b=new Uint8Array(h.length/2);for(let i=0;i<b.length;i++)b[i]=parseInt(h.substr(i*2,2),16);return b};
async function getKey(){return crypto.subtle.importKey('raw',h2b(KEY_HEX),'AES-GCM',false,['encrypt','decrypt'])}
async function dec(token){
  const key=await getKey();
  const raw=token.replace(/-/g,'+').replace(/_/g,'/');
  const pad=raw+'=='.slice(0,(4-raw.length%4)%4);
  const bytes=Uint8Array.from(atob(pad),c=>c.charCodeAt(0));
  const d=await crypto.subtle.decrypt({name:'AES-GCM',iv:bytes.slice(0,12)},key,bytes.slice(12));
  return JSON.parse(new TextDecoder().decode(d));
}

// ─── BOOT ─────────────────────────────────────────
const $=id=>document.getElementById(id);
const tok=new URLSearchParams(location.search).get('token');
function showInv(m){$('inv-msg').textContent=m;$('invalid').classList.add('show')}

(async()=>{
  if(!tok){showInv('No ?token= parameter found in the URL.');return}
  try{
    const cfg=await dec(tok);
    if(!cfg?.url){showInv('Token decoded but contains no stream URL.');return}
    $('shell').style.display='flex';
    init(cfg);
  }catch{showInv('Token is corrupted or was generated with a different key.')}
})();

// ─── PLAYER ───────────────────────────────────────
function init(cfg){
  const{url,introStart=NaN,introEnd=NaN,outroStart=NaN,outroEnd=NaN,subs=[],names=[]}=cfg;

  const shell=$('shell'),vid=$('vid'),grad=$('grad'),cw=$('cw');
  const bp=$('bp'),icp=$('icp'),cf=$('cf'),cfi=$('cfi');
  const brw=$('brw'),bff=$('bff');
  const bm=$('bm'),vp=$('vp'),vw=$('vw');
  const tt=$('tt');
  const bfs=$('bfs'),ifs=$('ifs');
  const pw=$('pw'),pr=$('pr'),pf=$('pf'),pb=$('pb'),pt=$('pt'),ptip=$('ptip');
  const skipBtn=$('skip-btn'),spin=$('spin'),cap=$('cap'),kf=$('kf');
  const cl=$('cl'),ql=$('ql'),spl=$('spl');
  const csi=$('csi'),cso=$('cso');
  const sfl=$('sf-l'),sfr=$('sf-r');
  const settingsPanel=$('settings-panel');
  const bs=$('bs');

  let hls=null,dur=0,hideT=null,introDone=false,outroDone=false;
  let activeTrack=-1,capLines=[],kT=null,dragging=false;

  // Hide intro/outro skip toggles if no markers
  if(isNaN(introStart))$('rsi').style.display='none';
  if(isNaN(outroStart))$('rso').style.display='none';

  // ── QUALITY LEVELS ───────────────────────────────
  // Strategy:
  //   Native HLS browser (Safari etc): video.src for everything — blob manifest
  //     for fixed quality, real master URL for Auto.
  //   Non-native (Chrome etc): hls.js for Auto (real master URL),
  //     native video.src blob for fixed quality (blob manifests work natively
  //     because the browser resolves the absolute stream URL inside them).
  const QUALITIES=[
    {label:'1080p', code:'f1', bw:'5000000', res:'1920x1080', badge:'HD'},
    {label:'720p',  code:'f2', bw:'2800000', res:'1280x720',  badge:''},
    {label:'360p',  code:'f3', bw:'1159248', res:'640x360',   badge:''},
  ];
  let currentQualityIdx=-1; // -1 = Auto
  let activeBlobUrl=null;

  const nativeHLS = !!vid.canPlayType('application/vnd.apple.mpegurl');

  // Strip the last filename from the URL to get base path
  function getBaseUrl(){
    return url.replace(/[^/?#]+\.m3u8(\?[^#]*)?(?:#.*)?$/, '');
  }

  // Build a single-stream blob manifest pointing at one quality
  function makeBlobManifest(q){
    const streamUrl = getBaseUrl() + 'index-' + q.code + '-v1-a1.m3u8';
    const txt = [
      '#EXTM3U',
      '#EXT-X-VERSION:3',
      '#EXT-X-STREAM-INF:BANDWIDTH=' + q.bw + ',RESOLUTION=' + q.res,
      streamUrl,
      ''
    ].join('\n');
    return new Blob([txt], {type:'application/x-mpegURL'});
  }

  function revokeBlobUrl(){
    if(activeBlobUrl){URL.revokeObjectURL(activeBlobUrl);activeBlobUrl=null;}
  }

  function buildQualUI(){
    ql.innerHTML='';
    const autoEl=document.createElement('div');
    autoEl.className='srow on';
    autoEl.dataset.qi='-1';
    autoEl.innerHTML='<span>Auto <span class="srow-sub">Adaptive</span></span><div class="dot"></div>';
    autoEl.addEventListener('click',()=>switchQuality(-1,autoEl));
    ql.appendChild(autoEl);
    QUALITIES.forEach((q,i)=>{
      const el=document.createElement('div');
      el.className='srow';
      el.dataset.qi=i;
      el.innerHTML='<span>'+q.label+(q.badge?'<span class="srow-sub qual-badge">'+q.badge+'</span>':'')+'</span><div class="dot"></div>';
      el.addEventListener('click',()=>switchQuality(i,el));
      ql.appendChild(el);
    });
  }

  function switchQuality(idx,el){
    if(idx===currentQualityIdx){closeSettings();return;}
    currentQualityIdx=idx;
    ql.querySelectorAll('.srow').forEach(r=>r.classList.remove('on'));
    el.classList.add('on');

    const pos=vid.currentTime;
    const wasPlaying=!vid.paused;
    spin.style.display='block';

    if(idx===-1){
      // ── AUTO ─────────────────────────────────────────
      // Always use the real master URL so ABR works properly
      revokeBlobUrl();
      if(hls){hls.destroy();hls=null;}
      if(nativeHLS){
        // Native: just point src at master
        setNativeSrc(url, pos, wasPlaying);
      } else {
        loadHlsJs(url, pos, wasPlaying);
      }
    } else {
      // ── FIXED QUALITY ────────────────────────────────
      // Use blob manifest + native video.src regardless of browser.
      // This works because the absolute stream URL inside the blob is fetched
      // by the browser's own HLS engine (native) or hls.js reads the src
      // which resolves correctly.
      if(hls){hls.destroy();hls=null;}
      revokeBlobUrl();
      const blob = makeBlobManifest(QUALITIES[idx]);
      activeBlobUrl = URL.createObjectURL(blob);
      if(nativeHLS){
        setNativeSrc(activeBlobUrl, pos, wasPlaying);
      } else {
        // hls.js can load blob: URLs when the inner URLs are absolute
        loadHlsJs(activeBlobUrl, pos, wasPlaying);
      }
    }

    flash(idx===-1 ? 'Quality: Auto' : 'Quality: '+QUALITIES[idx].label);
    closeSettings();
  }

  buildQualUI();

  // ── SETTINGS PANEL POSITIONING ────────────────────
  function positionPanel(){
    const bRect=bs.getBoundingClientRect();
    const panelW=260,margin=10;
    const panelH=settingsPanel.offsetHeight||320;
    let top=bRect.top-panelH-10;
    if(top<margin)top=bRect.bottom+10;
    let left=bRect.right-panelW;
    if(left<margin)left=margin;
    if(left+panelW>window.innerWidth-margin)left=window.innerWidth-panelW-margin;
    if(top+panelH>window.innerHeight-margin)top=window.innerHeight-panelH-margin;
    settingsPanel.style.left=left+'px';
    settingsPanel.style.top=top+'px';
  }

  // ── SETTINGS TABS ─────────────────────────────────
  document.querySelectorAll('.stab').forEach(tab=>{
    tab.addEventListener('click',()=>{
      document.querySelectorAll('.stab').forEach(t=>t.classList.remove('active'));
      document.querySelectorAll('.ssect').forEach(s=>s.classList.remove('active'));
      tab.classList.add('active');
      $('sect-'+tab.dataset.tab).classList.add('active');
      requestAnimationFrame(positionPanel);
    });
  });

  // ── SETTINGS TOGGLE ───────────────────────────────
  bs.addEventListener('click',e=>{
    e.stopPropagation();
    const willOpen=!settingsPanel.classList.contains('open');
    if(willOpen){
      settingsPanel.classList.add('open');
      bs.classList.add('lit');
      requestAnimationFrame(positionPanel);
    } else {
      closeSettings();
    }
  });

  function closeSettings(){
    settingsPanel.classList.remove('open');
    bs.classList.remove('lit');
  }

  shell.addEventListener('click',e=>{
    if(!e.target.closest('#settings-panel')&&!e.target.closest('#bs'))closeSettings();
  });
  settingsPanel.addEventListener('click',e=>e.stopPropagation());
  window.addEventListener('resize',()=>{if(settingsPanel.classList.contains('open'))positionPanel()});

  // ── PLAYBACK ENGINE ───────────────────────────────
  // Native HLS (Safari, iOS): use video.src directly — no hls.js needed.
  // Non-native (Chrome, Firefox): use hls.js for the master/auto URL.
  //   For fixed-quality blob URLs hls.js also works since inner URLs are absolute.

  function setNativeSrc(srcUrl, seekTo=0, autoPlay=true){
    vid.preload = 'auto';
    vid.src = srcUrl;
    vid.load();
    if(seekTo>0){
      vid.addEventListener('loadedmetadata',()=>{vid.currentTime=seekTo},{once:true});
    }
    if(autoPlay) vid.play().catch(()=>{});
    // spinner is managed by the global smart spinner above
  }

  function loadHlsJs(srcUrl, seekTo=0, autoPlay=true){
    hls = new Hls({
      enableWorker: true,
      startPosition: seekTo,
      // Aggressively preload — buffer up to 90s ahead, keep up to 180s in memory
      maxBufferLength: 90,
      maxMaxBufferLength: 180,
      maxBufferSize: 120*1000*1000,      // 120 MB
      maxBufferHole: 0.3,
      highBufferWatchdogPeriod: 2,
      nudgeOffset: 0.2,
      nudgeMaxRetry: 10,
      // Start loading next segment immediately after current one arrives
      lowLatencyMode: false,
      progressive: true,
      fragLoadingTimeOut: 20000,
      fragLoadingMaxRetry: 6,
      fragLoadingRetryDelay: 500,
      manifestLoadingTimeOut: 20000,
      manifestLoadingMaxRetry: 4,
      levelLoadingTimeOut: 20000,
      levelLoadingMaxRetry: 4,
      // Keep back-buffer so seeking backward is instant
      backBufferLength: 90,
    });
    hls.loadSource(srcUrl);
    hls.attachMedia(vid);
    hls.on(Hls.Events.MANIFEST_PARSED, ()=>{
      if(seekTo>0) vid.currentTime = seekTo;
      if(autoPlay) vid.play().catch(()=>{});
      spin.style.display='none';
    });
    hls.on(Hls.Events.ERROR, (_,d)=>{
      if(d.fatal){console.error('HLS fatal:',d.type,d.details);spin.style.display='none';}
    });
  }

  function startPlayback(){
    if(!Hls.isSupported() && !nativeHLS){
      showInv('HLS not supported in this browser.');
      shell.style.display='none';
      return;
    }
    // Auto mode on load
    if(nativeHLS){
      setNativeSrc(url);
    } else {
      loadHlsJs(url);
    }
  }

  startPlayback();

  // ── SPEED ─────────────────────────────────────────
  [0.25,0.5,0.75,1,1.25,1.5,1.75,2].forEach(s=>{
    const el=document.createElement('div');
    el.className='srow'+(s===1?' on':'');
    el.innerHTML=`<span>${s===1?'Normal (1×)':s+'×'}</span><div class="dot"></div>`;
    el.addEventListener('click',()=>{
      vid.playbackRate=s;
      spl.querySelectorAll('.srow').forEach(r=>r.classList.remove('on'));
      el.classList.add('on');
      flash(`Speed: ${s===1?'Normal':s+'×'}`);closeSettings();
    });
    spl.appendChild(el);
  });

  // ── SUBTITLES ─────────────────────────────────────
  async function loadSub(u,label,idx){
    try{
      const txt=await(await fetch(u)).text();
      const blob=new Blob([txt],{type:'text/vtt'});
      const tr=document.createElement('track');
      tr.kind='subtitles';tr.label=label;tr.src=URL.createObjectURL(blob);tr.srclang='und';
      vid.appendChild(tr);
      const el=document.createElement('div');
      el.className='srow';el.dataset.track=idx;
      el.innerHTML=`<span>${label}</span><div class="dot"></div>`;
      el.addEventListener('click',()=>selTrack(idx,el));
      cl.appendChild(el);
      parseVTT(txt,idx);
    }catch(e){console.warn('Sub fail',u,e)}
  }

  function selTrack(idx,el){
    activeTrack=idx;
    cl.querySelectorAll('.srow').forEach(r=>r.classList.remove('on'));
    if(el)el.classList.add('on');
    for(let i=0;i<vid.textTracks.length;i++)vid.textTracks[i].mode=i===idx?'hidden':'disabled';
    cap.style.display=idx>=0?'block':'none';
    if(idx<0)cap.textContent='';
    closeSettings();
  }

  cl.querySelector('[data-track="-1"]').addEventListener('click',function(){selTrack(-1,this)});

  function parseVTT(txt,idx){
    const cues=[];
    txt.split(/\n\n+/).forEach(block=>{
      const lines=block.trim().split('\n');
      const tl=lines.find(l=>l.includes('-->'));if(!tl)return;
      const[s,e]=tl.split('-->').map(x=>vttT(x.trim()));
      cues.push({start:s,end:e,text:lines.slice(lines.indexOf(tl)+1).join('\n').replace(/<[^>]+>/g,'')});
    });
    capLines[idx]=cues;
  }
  function vttT(s){const p=s.split(/[:,]/).map(Number);return p.length>=3?p[0]*3600+p[1]*60+(p[2]+(p[3]||0)/1000):p[0]*60+p[1]}

  if(subs.length){
    subs.forEach((u,i)=>loadSub(u.trim(),names[i]||`Track ${i+1}`,i));
  }

  // ── MARKERS ──────────────────────────────────────
  function buildMarkers(){
    if(!dur)return;
    pr.querySelectorAll('.seg,.sl').forEach(e=>e.remove());
    function addSeg(s,e2,cls,lbl){
      if(isNaN(s)||isNaN(e2)||!isFinite(s))return;
      const ps2=s/dur*100,pw2=(e2-s)/dur*100;
      const seg=document.createElement('div');
      seg.className=`seg ${cls}`;seg.style.left=ps2+'%';seg.style.width=pw2+'%';
      pr.appendChild(seg);
      const ld=document.createElement('div');
      ld.className=`sl ${cls}`;ld.textContent=lbl;ld.style.left=(ps2+pw2/2)+'%';
      pr.appendChild(ld);
    }
    addSeg(introStart,introEnd,'intro','Intro');
    addSeg(outroStart,outroEnd,'outro','Outro');
  }

  // ── TIME FMT ─────────────────────────────────────
  function fmt(s){
    if(!isFinite(s)||isNaN(s))return'0:00';
    const h=Math.floor(s/3600),m=Math.floor(s%3600/60),sec=Math.floor(s%60);
    return h?`${h}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`:`${m}:${String(sec).padStart(2,'0')}`;
  }

  // ── VIDEO EVENTS ─────────────────────────────────
  vid.addEventListener('loadedmetadata',()=>{dur=vid.duration;buildMarkers()});
  vid.addEventListener('durationchange',()=>{dur=vid.duration;buildMarkers()});

  vid.addEventListener('timeupdate',()=>{
    const ct=vid.currentTime;if(!dur)return;
    const pct=ct/dur*100;
    pf.style.width=pct+'%';
    pt.style.left=pct+'%';
    tt.textContent=`${fmt(ct)} / ${fmt(dur)}`;

    if(activeTrack>=0&&capLines[activeTrack]){
      const c=capLines[activeTrack].find(x=>ct>=x.start&&ct<=x.end);
      cap.textContent=c?c.text:'';
    }

    const inI=!isNaN(introStart)&&ct>=introStart&&ct<introEnd;
    const inO=!isNaN(outroStart)&&ct>=outroStart&&ct<outroEnd;
    if(inI){
      skipBtn.textContent='Skip Intro →';skipBtn.style.display='block';
      if(csi.checked&&!introDone){introDone=true;vid.currentTime=introEnd}
    } else if(inO){
      skipBtn.textContent='Skip Outro →';skipBtn.style.display='block';
      if(cso.checked&&!outroDone){outroDone=true;vid.currentTime=outroEnd}
    } else {
      skipBtn.style.display='none';
    }
    if(ct<(introStart||Infinity))introDone=false;
    if(ct<(outroStart||Infinity))outroDone=false;
  });

  vid.addEventListener('progress',()=>{
    if(!dur)return;
    let b=0;
    try{for(let i=0;i<vid.buffered.length;i++)if(vid.buffered.start(i)<=vid.currentTime+.1)b=Math.max(b,vid.buffered.end(i));}catch(e){}
    pb.style.width=(b/dur*100)+'%';
  });

  vid.addEventListener('play',()=>setPlayIcon(false));
  vid.addEventListener('pause',()=>setPlayIcon(true));

  // ── SPINNER: smart debounced logic ───────────────
  // Never let stalled/waiting show spinner if we already have enough buffer.
  // Use a short delay before showing so brief network blips don't flash the spinner.
  let spinShowT=null, spinHideT=null;

  function hasEnoughBuffer(){
    try{
      for(let i=0;i<vid.buffered.length;i++){
        if(vid.buffered.start(i)<=vid.currentTime+0.1 &&
           vid.buffered.end(i)>vid.currentTime+1.5) return true;
      }
    }catch(e){}
    return false;
  }

  function showSpinner(){
    clearTimeout(spinHideT);
    // Only show after 400ms delay — avoids flash for quick seeks/segment joins
    spinShowT=setTimeout(()=>{
      // Double-check: if playing fine now, don't show
      if(!vid.paused && vid.readyState>=3) return;
      spin.style.display='block';
    }, 400);
  }

  function hideSpinner(){
    clearTimeout(spinShowT);
    // Small delay before hiding so it doesn't flicker on/off
    spinHideT=setTimeout(()=>{ spin.style.display='none'; }, 80);
  }

  vid.addEventListener('waiting', ()=>{
    if(!hasEnoughBuffer()) showSpinner();
  });
  vid.addEventListener('stalled', ()=>{
    // stalled fires often on segment boundaries — only care if truly stuck
    if(!hasEnoughBuffer()) showSpinner();
  });
  vid.addEventListener('playing',  hideSpinner);
  vid.addEventListener('canplay',  hideSpinner);
  vid.addEventListener('canplaythrough', hideSpinner);
  vid.addEventListener('seeked',   ()=>{ if(vid.readyState>=3) hideSpinner(); });
  vid.addEventListener('progress', ()=>{ if(!vid.paused && hasEnoughBuffer()) hideSpinner(); });
  // Fallback: poll every 500ms and hide if video is actually running
  setInterval(()=>{
    if(!vid.paused && !vid.ended && vid.readyState>=3 && spin.style.display!=='none'){
      hideSpinner();
    }
  }, 500);

  function setPlayIcon(paused){
    if(paused){
      icp.innerHTML='<polygon points="5,3 19,12 5,21" fill="currentColor" stroke="none"/>';
      cfi.innerHTML='<polygon points="5,3 19,12 5,21" fill="rgba(255,255,255,.15)" stroke="white" stroke-width="1.5"/>';
    } else {
      icp.innerHTML='<line x1="6" y1="4" x2="6" y2="20" stroke="currentColor" stroke-width="2.5"/><line x1="18" y1="4" x2="18" y2="20" stroke="currentColor" stroke-width="2.5"/>';
      cfi.innerHTML='<line x1="6" y1="4" x2="6" y2="20" stroke="white" stroke-width="2.5"/><line x1="18" y1="4" x2="18" y2="20" stroke="white" stroke-width="2.5"/>';
    }
  }

  // ── PLAY/PAUSE ───────────────────────────────────
  function togglePlay(){
    if(vid.paused)vid.play();else vid.pause();
    popCF();
  }
  function popCF(){
    cf.classList.remove('pop');
    void cf.offsetWidth; // reflow to restart animation
    cf.classList.add('pop');
    setTimeout(()=>cf.classList.remove('pop'),650);
  }

  bp.addEventListener('click',togglePlay);

  // ── PROGRESS BAR ─────────────────────────────────
  function pctFromEvent(e){
    const rect=pr.getBoundingClientRect();
    return Math.max(0,Math.min(1,(e.clientX-rect.left)/rect.width));
  }

  // Update tip position on hover
  pw.addEventListener('mousemove',e=>{
    const p=pctFromEvent(e);
    const tLeft=p*100;
    ptip.style.left=tLeft+'%';
    ptip.textContent=fmt(p*dur);
    pt.style.left=tLeft+'%';
    pf.style.width=dragging?tLeft+'%':pf.style.width; // live update while dragging
  });

  // Mouse drag
  pw.addEventListener('mousedown',e=>{
    if(e.button!==0)return;
    dragging=true;
    pw.classList.add('drag');
    const p=pctFromEvent(e);
    if(dur){vid.currentTime=p*dur;pf.style.width=(p*100)+'%';pt.style.left=(p*100)+'%';}
    e.preventDefault();
    e.stopPropagation();
  });
  window.addEventListener('mousemove',e=>{
    if(!dragging)return;
    const rect=pr.getBoundingClientRect();
    const p=Math.max(0,Math.min(1,(e.clientX-rect.left)/rect.width));
    if(dur){vid.currentTime=p*dur;pf.style.width=(p*100)+'%';pt.style.left=(p*100)+'%';}
    ptip.style.left=(p*100)+'%';ptip.textContent=fmt(p*dur);
  });
  window.addEventListener('mouseup',e=>{
    if(!dragging)return;
    dragging=false;pw.classList.remove('drag');
  });

  // Touch drag
  pw.addEventListener('touchstart',e=>{
    dragging=true;pw.classList.add('drag');
    tSeek(e.touches[0]);
    e.preventDefault();
  },{passive:false});
  window.addEventListener('touchmove',e=>{
    if(!dragging)return;
    tSeek(e.touches[0]);
    e.preventDefault();
  },{passive:false});
  window.addEventListener('touchend',()=>{dragging=false;pw.classList.remove('drag')});

  function tSeek(t){
    const rect=pr.getBoundingClientRect();
    const p=Math.max(0,Math.min(1,(t.clientX-rect.left)/rect.width));
    if(dur){vid.currentTime=p*dur;pf.style.width=(p*100)+'%';pt.style.left=(p*100)+'%';}
  }

  // Seek ±N seconds
  function seek(s){
    vid.currentTime=Math.max(0,Math.min(dur||Infinity,vid.currentTime+s));
    flash(s>0?`+${s}s`:`${s}s`);
    const el=s>0?sfr:sfl;
    el.classList.add('show');
    clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('show'),350);
  }

  skipBtn.addEventListener('click',()=>{
    if(!isNaN(introEnd)&&vid.currentTime>=introStart&&vid.currentTime<introEnd){vid.currentTime=introEnd;introDone=true;}
    else if(!isNaN(outroEnd)){vid.currentTime=outroEnd;outroDone=true;}
  });

  brw.addEventListener('click',()=>seek(-10));
  bff.addEventListener('click',()=>seek(10));

  // ── TAP ZONES ─────────────────────────────────────
  function setupZone(zoneId,dir){
    const zone=$(zoneId);
    let taps=0,tapT=null;
    zone.addEventListener('click',e=>{
      e.stopPropagation();
      taps++;
      clearTimeout(tapT);
      tapT=setTimeout(()=>{
        if(taps>=2)seek(dir*10);
        else{togglePlay();showUI();}
        taps=0;
      },230);
    });
  }
  setupZone('tz-l',-1);
  setupZone('tz-r',1);

  // ── VOLUME ───────────────────────────────────────
  bm.addEventListener('click',()=>{vid.muted=!vid.muted;updVol();flash(vid.muted?'Muted':'Unmuted')});
  function updVol(){
    const v=vid.muted?0:vid.volume;
    if(v===0){
      vp.setAttribute('points','11,5 6,9 2,9 2,15 6,15 11,19');
      vw.setAttribute('d','M23 9l-6 6M17 9l6 6');
    } else if(v<.5){
      vp.setAttribute('points','11,5 6,9 2,9 2,15 6,15 11,19');
      vw.setAttribute('d','M15.54 8.46a5 5 0 0 1 0 7.07');
    } else {
      vp.setAttribute('points','11,5 6,9 2,9 2,15 6,15 11,19');
      vw.setAttribute('d','M15.54 8.46a5 5 0 0 1 0 7.07M19.07 4.93a10 10 0 0 1 0 14.14');
    }
  }

  // ── FULLSCREEN ───────────────────────────────────
  bfs.addEventListener('click',toggleFS);
  async function toggleFS(){
    const fsEl=document.fullscreenElement||document.webkitFullscreenElement;
    if(!fsEl){
      try{
        await(shell.requestFullscreen||shell.webkitRequestFullscreen).call(shell);
        if(screen.orientation?.lock)screen.orientation.lock('landscape').catch(()=>{});
      }catch(e){}
    } else {
      try{
        await(document.exitFullscreen||document.webkitExitFullscreen).call(document);
        if(screen.orientation?.unlock)screen.orientation.unlock();
      }catch(e){}
    }
  }

  ['fullscreenchange','webkitfullscreenchange'].forEach(ev=>document.addEventListener(ev,()=>{
    const inFS=!!(document.fullscreenElement||document.webkitFullscreenElement);
    ifs.innerHTML=inFS
      ?'<polyline points="4,14 10,14 10,20"/><polyline points="20,10 14,10 14,4"/><line x1="10" y1="14" x2="3" y2="21"/><line x1="21" y1="3" x2="14" y2="10"/>'
      :'<polyline points="15,3 21,3 21,9"/><polyline points="9,21 3,21 3,15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/>';
    if(!inFS&&screen.orientation?.unlock)screen.orientation.unlock();
    // Reposition settings panel after fullscreen change
    if(settingsPanel.classList.contains('open')){
      requestAnimationFrame(positionPanel);
    }
  }));

  // ── PiP ─────────────────────────────────────────
  $('rpip').addEventListener('click',()=>{
    if(document.pictureInPictureElement)document.exitPictureInPicture();
    else if(document.pictureInPictureEnabled)vid.requestPictureInPicture();
    closeSettings();
  });

  // ── UI SHOW/HIDE ─────────────────────────────────
  function showUI(){
    grad.classList.add('on');
    cw.classList.add('active');
    shell.classList.add('cur');
    clearTimeout(hideT);
    hideT=setTimeout(()=>{
      if(!vid.paused&&!settingsPanel.classList.contains('open')){
        grad.classList.remove('on');
        cw.classList.remove('active');
        shell.classList.remove('cur');
      }
    },3500);
  }

  shell.addEventListener('mousemove',showUI);
  shell.addEventListener('touchstart',showUI,{passive:true});
  shell.addEventListener('mouseleave',()=>{
    if(!vid.paused&&!settingsPanel.classList.contains('open')){
      clearTimeout(hideT);
      grad.classList.remove('on');cw.classList.remove('active');shell.classList.remove('cur');
    }
  });
  vid.addEventListener('pause',showUI);
  vid.addEventListener('play',()=>{
    // restart auto-hide on play
    showUI();
  });

  // ── KBD FLASH ───────────────────────────────────
  function flash(msg){kf.textContent=msg;kf.classList.add('on');clearTimeout(kT);kT=setTimeout(()=>kf.classList.remove('on'),1400)}

  // ── KEYBOARD ─────────────────────────────────────
  document.addEventListener('keydown',e=>{
    if(['INPUT','TEXTAREA','SELECT'].includes(e.target.tagName))return;
    showUI();
    switch(e.key){
      case' ':case'k':case'K':e.preventDefault();togglePlay();break;
      case'ArrowRight':case'l':case'L':e.preventDefault();seek(e.shiftKey?30:10);break;
      case'ArrowLeft':case'j':case'J':e.preventDefault();seek(e.shiftKey?-30:-10);break;
      case'ArrowUp':e.preventDefault();vid.volume=Math.min(1,vid.volume+.1);vid.muted=false;updVol();flash(`Volume ${Math.round(vid.volume*100)}%`);break;
      case'ArrowDown':e.preventDefault();vid.volume=Math.max(0,vid.volume-.1);updVol();flash(`Volume ${Math.round(vid.volume*100)}%`);break;
      case'm':case'M':vid.muted=!vid.muted;updVol();flash(vid.muted?'Muted':'Unmuted');break;
      case'f':case'F':toggleFS();break;
      case's':case'S':
        if(settingsPanel.classList.contains('open'))closeSettings();
        else{settingsPanel.classList.add('open');bs.classList.add('lit');requestAnimationFrame(positionPanel);}
        break;
      case'i':case'I':
        if(!isNaN(introEnd)&&vid.currentTime>=introStart&&vid.currentTime<introEnd){vid.currentTime=introEnd;introDone=true;flash('Skipped Intro')}break;
      case'p':case'P':
        if(document.pictureInPictureEnabled){document.pictureInPictureElement?document.exitPictureInPicture():vid.requestPictureInPicture();}break;
      case'>':case'.':vid.playbackRate=Math.min(2,+(vid.playbackRate+.25).toFixed(2));flash(`Speed: ${vid.playbackRate}×`);break;
      case'<':case',':vid.playbackRate=Math.max(.25,+(vid.playbackRate-.25).toFixed(2));flash(`Speed: ${vid.playbackRate}×`);break;
      case'0':case'1':case'2':case'3':case'4':case'5':case'6':case'7':case'8':case'9':
        if(dur){vid.currentTime=parseInt(e.key)/10*dur;flash(`Jump: ${e.key}0%`)}break;
      case'Home':vid.currentTime=0;flash('Start');break;
      case'End':if(dur){vid.currentTime=dur;flash('End')}break;
    }
  });

  // Start showing UI
  showUI();
}
</script>
</body>
</html>
