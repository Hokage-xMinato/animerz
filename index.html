<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>Lumina Player</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}

:root{
  --gold:#F0C040;
  --gold-glow:rgba(240,192,64,.22);
  --bg:#0c0c0e;
  --surf:rgba(255,255,255,.05);
  --surf2:rgba(255,255,255,.09);
  --bdr:rgba(255,255,255,.10);
  --txt:#F2F2F2;
  --mid:rgba(242,242,242,.55);
  --dim:rgba(242,242,242,.3);
  --intro:#3ECFCB;
  --outro:#E8507A;
  --fn:'Syne',sans-serif;
  --mono:'DM Mono',monospace;
  --ease:cubic-bezier(.4,0,.2,1);
  --spring:cubic-bezier(.34,1.56,.64,1);
}

html,body{
  width:100%;height:100%;
  overflow:hidden;background:#000;
  font-family:var(--fn);color:var(--txt);
  touch-action:none;
}

/* INVALID */
#invalid{
  display:none;position:fixed;inset:0;z-index:9999;
  background:var(--bg);
  flex-direction:column;align-items:center;justify-content:center;
  gap:20px;text-align:center;padding:40px;
}
#invalid.show{display:flex}
.inv-ic{
  width:72px;height:72px;border-radius:18px;
  background:rgba(232,80,80,.1);border:1px solid rgba(232,80,80,.25);
  display:flex;align-items:center;justify-content:center;
}
.inv-ic svg{width:32px;height:32px;stroke:#E85050;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
#invalid h1{font-size:clamp(18px,4vw,26px);font-weight:700;letter-spacing:-.03em}
#invalid p{font-size:14px;color:var(--mid);max-width:300px;line-height:1.7}

/* SHELL */
#shell{
  position:fixed;inset:0;
  background:#000;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;cursor:none;user-select:none;
}
#shell.cur{cursor:default}

video{
  position:absolute;inset:0;
  width:100%;height:100%;
  object-fit:contain;
  pointer-events:none;
}

/* GRADIENT */
#grad{
  position:absolute;inset:0;
  background:linear-gradient(to bottom,rgba(0,0,0,.55) 0%,transparent 18%,transparent 54%,rgba(0,0,0,.65) 80%,rgba(0,0,0,.92) 100%);
  pointer-events:none;opacity:0;
  transition:opacity .25s var(--ease);z-index:1;
}
#grad.on{opacity:1}

/* TAP ZONES — no ripple circles, just invisible zones */
.tz{
  position:absolute;top:0;bottom:0;width:38%;
  z-index:4;
}
#tz-l{left:0}#tz-r{right:0}

/* Seek flash overlay */
.seek-flash{
  position:absolute;top:0;bottom:0;width:38%;
  z-index:5;pointer-events:none;
  display:flex;align-items:center;justify-content:center;
  opacity:0;
  transition:opacity .18s;
}
#sf-l{left:0;background:radial-gradient(ellipse at 30% 50%,rgba(255,255,255,.12) 0%,transparent 70%)}
#sf-r{right:0;background:radial-gradient(ellipse at 70% 50%,rgba(255,255,255,.12) 0%,transparent 70%)}
.seek-flash.show{opacity:1}
.seek-flash svg{width:22px;height:22px;stroke:rgba(255,255,255,.85);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

/* SPINNER */
#spin{
  position:absolute;top:50%;left:50%;z-index:10;
  transform:translate(-50%,-50%);
  width:46px;height:46px;border-radius:50%;
  border:2px solid rgba(255,255,255,.08);
  border-top-color:var(--gold);
  animation:rot .7s linear infinite;display:none;pointer-events:none;
}
@keyframes rot{to{transform:translate(-50%,-50%) rotate(360deg)}}

/* CENTER FLASH */
#cf{
  position:absolute;top:50%;left:50%;z-index:8;
  transform:translate(-50%,-50%) scale(0);
  width:68px;height:68px;border-radius:50%;
  background:rgba(0,0,0,.52);
  border:1.5px solid rgba(255,255,255,.15);
  display:flex;align-items:center;justify-content:center;
  pointer-events:none;opacity:0;
  transition:transform .12s var(--spring),opacity .22s var(--ease);
}
#cf svg{width:26px;height:26px;stroke:#fff;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
#cf.pop{opacity:1;transform:translate(-50%,-50%) scale(1)}

/* SKIP BTN */
#skip-btn{
  position:absolute;z-index:20;
  right:clamp(14px,4vw,32px);bottom:clamp(82px,15vh,124px);
  background:rgba(12,12,14,.82);
  border:1.5px solid var(--gold);color:var(--gold);
  font-family:var(--fn);font-size:11px;font-weight:700;
  letter-spacing:.12em;text-transform:uppercase;
  padding:9px 20px;border-radius:5px;cursor:pointer;display:none;
  backdrop-filter:blur(12px);
  transition:background .15s,color .15s,transform .12s;
}
#skip-btn:hover,#skip-btn:active{background:var(--gold);color:#000;transform:scale(1.03)}

/* CAPTIONS */
#cap{
  position:absolute;z-index:15;
  bottom:clamp(74px,13vh,112px);
  left:50%;transform:translateX(-50%);
  text-align:center;
  font-family:var(--fn);
  font-size:clamp(13px,2.2vw,20px);
  font-weight:500;line-height:1.55;
  color:#fff;
  text-shadow:0 1px 5px rgba(0,0,0,1),0 2px 14px rgba(0,0,0,.7);
  padding:5px 16px 6px;
  background:rgba(0,0,0,.62);border-radius:5px;
  max-width:min(82%,640px);
  pointer-events:none;display:none;
  backdrop-filter:blur(3px);
}

/* KBD FLASH */
#kf{
  position:absolute;top:20px;left:50%;transform:translateX(-50%);
  z-index:30;
  background:rgba(12,12,14,.9);border:1px solid var(--bdr);
  color:var(--txt);font-family:var(--mono);font-size:11px;
  padding:5px 14px;border-radius:5px;backdrop-filter:blur(10px);
  white-space:nowrap;opacity:0;pointer-events:none;
  transition:opacity .18s;letter-spacing:.04em;
}
#kf.on{opacity:1}

/* CONTROLS WRAP */
#cw{
  position:absolute;left:0;right:0;bottom:0;z-index:20;
  padding:0 clamp(12px,3vw,26px) clamp(10px,env(safe-area-inset-bottom,0px)+10px,24px);
  display:flex;flex-direction:column;gap:6px;
  pointer-events:none;
}
#cw.active{pointer-events:all}

/* PROGRESS */
#pw{
  position:relative;height:24px;
  display:flex;align-items:center;
  cursor:pointer;padding:8px 0;touch-action:none;
}
#pr{
  position:relative;width:100%;height:3px;
  background:rgba(255,255,255,.2);border-radius:99px;
  transition:height .18s var(--ease);
}
#pw:hover #pr,#pw.drag #pr{height:5px}

#pb{position:absolute;top:0;left:0;height:100%;background:rgba(255,255,255,.25);border-radius:99px;pointer-events:none;transition:width .3s linear}
#pf{position:absolute;top:0;left:0;height:100%;background:var(--gold);border-radius:99px;pointer-events:none}
#pt{
  position:absolute;top:50%;
  width:12px;height:12px;border-radius:50%;background:#fff;
  transform:translate(-50%,-50%) scale(0);
  pointer-events:none;
  transition:transform .15s var(--spring);
  box-shadow:0 0 0 3px var(--gold-glow);z-index:3;
}
#pw:hover #pt,#pw.drag #pt{transform:translate(-50%,-50%) scale(1)}

.seg{position:absolute;top:0;height:100%;border-radius:99px;pointer-events:none;z-index:2}
.seg.intro{background:var(--intro);opacity:.72}
.seg.outro{background:var(--outro);opacity:.72}

.sl{
  position:absolute;bottom:calc(100% + 10px);
  transform:translateX(-50%);
  font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  padding:2px 7px;border-radius:3px;
  pointer-events:none;white-space:nowrap;
  opacity:0;transition:opacity .18s;z-index:5;
}
#pw:hover .sl{opacity:1}
.sl.intro{background:var(--intro);color:#0a1a1a}
.sl.outro{background:var(--outro);color:#fff}

#ptip{
  position:absolute;bottom:calc(100% + 13px);
  transform:translateX(-50%);
  background:rgba(10,10,14,.94);border:1px solid var(--bdr);
  color:#fff;font-family:var(--mono);font-size:10px;
  padding:3px 9px;border-radius:4px;
  pointer-events:none;opacity:0;white-space:nowrap;
  transition:opacity .12s;z-index:10;backdrop-filter:blur(8px);
}
#pw:hover #ptip{opacity:1}

/* BUTTON ROW */
#row{display:flex;align-items:center;gap:2px;height:44px}

.btn{
  background:none;border:none;color:var(--txt);cursor:pointer;
  width:38px;height:38px;border-radius:7px;
  display:flex;align-items:center;justify-content:center;
  transition:background .14s,color .14s,transform .1s;
  flex-shrink:0;position:relative;
}
.btn:hover{background:var(--surf2);color:#fff}
.btn:active{transform:scale(.84)}
.btn.lit{color:var(--gold)}
.btn svg{width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round;pointer-events:none}
#bp svg{width:22px;height:22px}

/* SEEK BUTTONS */
.seek-btn{
  background:none;border:none;color:var(--txt);cursor:pointer;
  width:42px;height:38px;border-radius:7px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;
  transition:background .14s,color .14s,transform .1s;
  flex-shrink:0;
}
.seek-btn:hover{background:var(--surf2);color:#fff}
.seek-btn:active{transform:scale(.84)}
.seek-btn svg{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.seek-btn span{font-family:var(--mono);font-size:8.5px;font-weight:500;letter-spacing:.04em;color:var(--mid);line-height:1}

#tt{font-family:var(--mono);font-size:10.5px;color:var(--mid);letter-spacing:.04em;margin-left:4px;white-space:nowrap;user-select:none}
#sp{flex:1}

/* POPUPS */
.pop{
  position:fixed;
  min-width:215px;
  background:rgba(11,11,16,.97);border:1px solid var(--bdr);
  border-radius:10px;backdrop-filter:blur(30px);
  padding:5px;display:none;flex-direction:column;gap:1px;
  z-index:50;
  box-shadow:0 22px 60px rgba(0,0,0,.85),0 0 0 .5px rgba(255,255,255,.04);
  animation:pi .18s var(--spring);
}
.pop.open{display:flex}
@keyframes pi{from{opacity:0;transform:translateY(8px) scale(.95)}to{opacity:1;transform:translateY(0) scale(1)}}

.pt{font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--dim);padding:7px 11px 4px}
.pd{height:1px;background:var(--bdr);margin:4px 8px}

.pr{
  display:flex;align-items:center;justify-content:space-between;
  padding:7px 11px;border-radius:7px;
  cursor:pointer;font-size:12.5px;gap:10px;
  transition:background .12s;font-family:var(--fn);
}
.pr:hover{background:var(--surf2)}
.pr.on{color:var(--gold)}
.pr .dot{width:5px;height:5px;border-radius:50%;background:var(--gold);flex-shrink:0;opacity:0;transition:opacity .12s}
.pr.on .dot{opacity:1}

.psc{max-height:175px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.1) transparent}

/* Toggle */
.tog{position:relative;width:30px;height:16px;flex-shrink:0}
.tog input{opacity:0;width:0;height:0}
.togt{position:absolute;inset:0;border-radius:99px;background:rgba(255,255,255,.16);cursor:pointer;transition:background .18s}
.tog input:checked+.togt{background:var(--gold)}
.togk{position:absolute;top:2px;left:2px;width:12px;height:12px;border-radius:50%;background:#fff;transition:left .18s var(--ease);pointer-events:none}
.tog input:checked~.togk{left:16px}

/* MOBILE */
@media(max-width:480px){
  .btn{width:34px;height:34px}
  .btn svg{width:16px;height:16px}
  #bp svg{width:20px;height:20px}
  #tt{font-size:9.5px;margin-left:2px}
  .seek-btn{width:36px}.seek-btn svg{width:14px;height:14px}
  #cw{padding:0 10px clamp(10px,env(safe-area-inset-bottom,0px)+10px,20px)}
  #skip-btn{right:12px;font-size:10px;padding:7px 13px}
}
@media(max-height:380px){
  #cw{gap:3px;padding-bottom:8px}
  #row{height:36px}
  .btn{width:32px;height:32px}
  .seek-btn{height:32px}
}
</style>
</head>
<body>

<!-- Invalid Screen -->
<div id="invalid">
  <div class="inv-ic">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
  </div>
  <h1>Invalid Token</h1>
  <p id="inv-msg">No token was provided, or it could not be decrypted. Please generate a valid token.</p>
</div>

<!-- Player -->
<div id="shell" style="display:none">
  <video id="vid" playsinline preload="metadata"></video>

  <!-- Tap Zones (no ripple bubbles) -->
  <div class="tz" id="tz-l"></div>
  <div class="tz" id="tz-r"></div>

  <!-- Seek flash overlays -->
  <div class="seek-flash" id="sf-l">
    <svg viewBox="0 0 24 24"><polyline points="1,4 1,10 7,10"/><path d="M3.51 15a9 9 0 1 0 .49-3.41"/></svg>
  </div>
  <div class="seek-flash" id="sf-r">
    <svg viewBox="0 0 24 24"><polyline points="23,4 23,10 17,10"/><path d="M20.49 15a9 9 0 1 1-.49-3.41"/></svg>
  </div>

  <div id="grad"></div>
  <div id="spin"></div>
  <div id="cf"><svg id="cfi" viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg></div>
  <div id="cap"></div>
  <button id="skip-btn">Skip →</button>
  <div id="kf"></div>

  <!-- Controls -->
  <div id="cw">

    <!-- Progress bar -->
    <div id="pw">
      <div id="ptip">0:00</div>
      <div id="pr">
        <div id="pb"></div>
        <div id="pf"></div>
        <div id="pt"></div>
      </div>
    </div>

    <!-- Button row -->
    <div id="row">

      <!-- Play/Pause -->
      <button class="btn" id="bp" title="Play / Pause  [Space / K]">
        <svg id="icp" viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>
      </button>

      <!-- Back 10s -->
      <button class="seek-btn" id="brw" title="Rewind 10s  [J / ←]">
        <svg viewBox="0 0 24 24">
          <path d="M12 5V2L7 7l5 5V8a7 7 0 1 1-7 7"/>
        </svg>
        <span>10s</span>
      </button>

      <!-- Forward 10s -->
      <button class="seek-btn" id="bff" title="Forward 10s  [L / →]">
        <svg viewBox="0 0 24 24">
          <path d="M12 5V2l5 5-5 5V8a7 7 0 1 0 7 7"/>
        </svg>
        <span>10s</span>
      </button>

      <!-- Mute only -->
      <button class="btn" id="bm" title="Mute  [M]">
        <svg viewBox="0 0 24 24">
          <polygon id="vp" points="11,5 6,9 2,9 2,15 6,15 11,19"/>
          <path id="vw" d="M15.54 8.46a5 5 0 0 1 0 7.07M19.07 4.93a10 10 0 0 1 0 14.14"/>
        </svg>
      </button>

      <!-- Time -->
      <span id="tt">0:00 / 0:00</span>

      <div id="sp"></div>

      <!-- Captions -->
      <div style="position:relative" id="cc-wrap">
        <button class="btn" id="bcc" title="Subtitles  [C]">
          <svg viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="3"/><line x1="6" y1="10" x2="18" y2="10"/><line x1="6" y1="14" x2="13" y2="14"/></svg>
        </button>
        <div class="pop" id="pc">
          <div class="pt">Subtitles</div>
          <div class="psc" id="cl">
            <div class="pr on" data-track="-1"><span>Off</span><div class="dot"></div></div>
          </div>
        </div>
      </div>

      <!-- Settings -->
      <div style="position:relative" id="s-wrap">
        <button class="btn" id="bs" title="Settings  [S]">
          <svg viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
        </button>
        <div class="pop" id="ps">
          <div class="pt">Quality</div>
          <div class="psc" id="ql">
            <div class="pr on" data-level="-1"><span>Auto</span><div class="dot"></div></div>
          </div>
          <div class="pd"></div>
          <div class="pt">Playback Speed</div>
          <div class="psc" id="spl"></div>
          <div class="pd"></div>
          <div class="pt">Options</div>
          <div class="pr" id="rpip">
            <span>Picture in Picture</span>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><rect x="12" y="10" width="9" height="7" rx="1"/></svg>
          </div>
          <div class="pr" id="rsi">
            <span>Auto-skip Intro</span>
            <label class="tog"><input type="checkbox" id="csi" checked><div class="togt"></div><div class="togk"></div></label>
          </div>
          <div class="pr" id="rso">
            <span>Auto-skip Outro</span>
            <label class="tog"><input type="checkbox" id="cso"><div class="togt"></div><div class="togk"></div></label>
          </div>
        </div>
      </div>

      <!-- Fullscreen -->
      <button class="btn" id="bfs" title="Fullscreen  [F]">
        <svg id="ifs" viewBox="0 0 24 24">
          <polyline points="15,3 21,3 21,9"/><polyline points="9,21 3,21 3,15"/>
          <line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/>
        </svg>
      </button>

    </div>
  </div>
</div>

<script>
// ─── CRYPTO ───────────────────────────────────────
const KEY_HEX='a3f8c2e1b4d7f6a0c9e2b5d8f1a4c7e0b3d6f9a2c5e8b1d4f7a0c3e6b9d2f5a8';
const h2b=h=>{const b=new Uint8Array(h.length/2);for(let i=0;i<b.length;i++)b[i]=parseInt(h.substr(i*2,2),16);return b};
async function getKey(){return crypto.subtle.importKey('raw',h2b(KEY_HEX),'AES-GCM',false,['encrypt','decrypt'])}
async function dec(token){
  const key=await getKey();
  const raw=token.replace(/-/g,'+').replace(/_/g,'/');
  const pad=raw+'=='.slice(0,(4-raw.length%4)%4);
  const bytes=Uint8Array.from(atob(pad),c=>c.charCodeAt(0));
  const d=await crypto.subtle.decrypt({name:'AES-GCM',iv:bytes.slice(0,12)},key,bytes.slice(12));
  return JSON.parse(new TextDecoder().decode(d));
}

// ─── BOOT ─────────────────────────────────────────
const $=id=>document.getElementById(id);
const tok=new URLSearchParams(location.search).get('token');

function showInv(m){$('inv-msg').textContent=m;$('invalid').classList.add('show')}

(async()=>{
  if(!tok){showInv('No ?token= parameter found in the URL.');return}
  try{
    const cfg=await dec(tok);
    if(!cfg?.url){showInv('Token decoded but contains no stream URL.');return}
    $('shell').style.display='flex';
    init(cfg);
  }catch{showInv('Token is corrupted or was generated with a different key.')}
})();

// ─── PLAYER ───────────────────────────────────────
function init(cfg){
  const{url,introStart=NaN,introEnd=NaN,outroStart=NaN,outroEnd=NaN,subs=[],names=[]}=cfg;

  const shell=$('shell'),vid=$('vid'),grad=$('grad'),cw=$('cw');
  const bp=$('bp'),icp=$('icp'),cf=$('cf'),cfi=$('cfi');
  const brw=$('brw'),bff=$('bff');
  const bm=$('bm'),vp=$('vp'),vw=$('vw');
  const tt=$('tt');
  const bfs=$('bfs'),ifs=$('ifs');
  const pw=$('pw'),pr=$('pr'),pf=$('pf'),pb=$('pb'),pt=$('pt'),ptip=$('ptip');
  const skipBtn=$('skip-btn'),spin=$('spin'),cap=$('cap'),kf=$('kf');
  const bcc=$('bcc'),pc=$('pc'),cl=$('cl');
  const bs=$('bs'),ps=$('ps'),ql=$('ql'),spl=$('spl');
  const csi=$('csi'),cso=$('cso');
  const rsi=$('rsi'),rso=$('rso');
  const sfl=$('sf-l'),sfr=$('sf-r');

  let hls=null,dur=0,hideT=null,introDone=false,outroDone=false;
  let activeTrack=-1,capLines=[],kT=null,dragging=false;
  let hlsLevels=[];

  if(isNaN(introStart))rsi.style.display='none';
  if(isNaN(outroStart))rso.style.display='none';

  // ── POPUP POSITIONING ────────────────────────────
  function positionPopup(popup, anchor) {
    const aRect = anchor.getBoundingClientRect();
    const pw2 = 220; // approx popup width
    const ph = popup.scrollHeight || 300;
    const margin = 10;

    // Horizontal: prefer right-align to anchor, but clamp to viewport
    let left = aRect.right - pw2;
    if (left < margin) left = margin;
    if (left + pw2 > window.innerWidth - margin) left = window.innerWidth - pw2 - margin;

    // Vertical: above the button
    let top = aRect.top - ph - 10;
    if (top < margin) top = aRect.bottom + 10;

    popup.style.left = left + 'px';
    popup.style.top = top + 'px';
    popup.style.right = 'auto';
    popup.style.bottom = 'auto';
  }

  // ── HLS ──────────────────────────────────────────
  if(vid.canPlayType('application/vnd.apple.mpegurl')){
    vid.src=url;
    loadManifest(url);
    vid.play().catch(()=>{});
  } else if(Hls.isSupported()){
    hls=new Hls({enableWorker:true,startLevel:-1});
    hls.loadSource(url);
    hls.attachMedia(vid);
    hls.on(Hls.Events.MANIFEST_PARSED,(_,d)=>{
      hlsLevels=d.levels;
      buildQualFromHls(d.levels);
      vid.play().catch(()=>{});
    });
    hls.on(Hls.Events.ERROR,(_,d)=>{if(d.fatal)console.error('HLS',d)});
  } else {showInv('HLS not supported in this browser.');shell.style.display='none';return}

  // Parse manifest (for native HLS/Safari)
  async function loadManifest(u){
    try{
      const txt=await(await fetch(u)).text();
      const lvls=parseM3U8(txt,u);
      if(lvls.length)buildQualFromManifest(lvls);
    }catch(e){}
  }

  function parseM3U8(txt,base){
    const lines=txt.split('\n'),out=[];
    for(let i=0;i<lines.length;i++){
      const l=lines[i].trim();
      if(!l.startsWith('#EXT-X-STREAM-INF:'))continue;
      if(l.includes('I-FRAME'))continue;
      const bw=(l.match(/BANDWIDTH=(\d+)/)||[])[1]|0;
      const res=(l.match(/RESOLUTION=(\d+)x(\d+)/)||[]);
      const w=+res[1]||0,h=+res[2]||0;
      // Next non-empty, non-comment line is the URI
      let j=i+1;
      while(j<lines.length&&(lines[j].trim()===''||lines[j].trim().startsWith('#')))j++;
      const uri=lines[j]?.trim();
      if(!uri)continue;
      const resolved=/^https?:\/\//i.test(uri)?uri:resolveUri(uri,base);
      out.push({bandwidth:bw,width:w,height:h,uri:resolved});
    }
    return out.sort((a,b)=>b.height-a.height||b.bandwidth-a.bandwidth);
  }

  function resolveUri(uri,base){
    try{
      const u=new URL(base);
      if(uri.startsWith('/'))return u.origin+uri;
      const p=u.pathname.split('/');p.pop();p.push(uri);
      return u.origin+p.join('/');
    }catch{return uri}
  }

  // ── QUALITY (hls.js) ──────────────────────────────
  function buildQualFromHls(levels){
    ql.innerHTML='';
    // Auto option
    const autoEl=mkQEl('Auto','auto',-1,true);
    ql.appendChild(autoEl);
    // Sort by height desc
    const sorted=[...levels].map((l,i)=>({...l,idx:i}))
      .sort((a,b)=>(b.height||0)-(a.height||0)||(b.bitrate||b.bandwidth||0)-(a.bitrate||a.bandwidth||0));
    sorted.forEach(l=>{
      const h=l.height||0;
      const bw=l.bitrate||l.bandwidth||0;
      const label=h?`${h}p`:(bw?`${Math.round(bw/1000)}k`:`Stream ${l.idx+1}`);
      const sub=bw?`${Math.round(bw/1000)} kbps`:'';
      ql.appendChild(mkQEl(label,sub,l.idx,false));
    });
  }

  // ── QUALITY (native/safari) ─────────────────────
  function buildQualFromManifest(levels){
    ql.innerHTML='';
    const autoEl=mkQEl('Auto','auto',-1,true);
    ql.appendChild(autoEl);
    levels.forEach((l,i)=>{
      const h=l.height||0;
      const bw=l.bandwidth||0;
      const label=h?`${h}p`:`Stream ${i+1}`;
      const sub=bw?`${Math.round(bw/1000)} kbps`:'';
      ql.appendChild(mkQEl(label,sub,i,false));
    });
  }

  function mkQEl(label,sub,level,active){
    const el=document.createElement('div');
    el.className='pr'+(active?' on':'');
    el.dataset.level=level;
    el.innerHTML=`<span>${label}${sub?`<span style="font-size:10px;color:var(--dim);margin-left:6px">${sub}</span>`:''}</span><div class="dot"></div>`;
    el.addEventListener('click',()=>{
      ql.querySelectorAll('.pr').forEach(r=>r.classList.remove('on'));
      el.classList.add('on');
      if(hls)hls.currentLevel=level;
      flash(`Quality: ${label}`);closeAll();
    });
    return el;
  }

  // ── SPEED ─────────────────────────────────────────
  [.25,.5,.75,1,1.25,1.5,1.75,2].forEach(s=>{
    const el=document.createElement('div');
    el.className='pr'+(s===1?' on':'');
    el.innerHTML=`<span>${s===1?'Normal':s+'×'}</span><div class="dot"></div>`;
    el.addEventListener('click',()=>{
      vid.playbackRate=s;
      spl.querySelectorAll('.pr').forEach(r=>r.classList.remove('on'));
      el.classList.add('on');
      flash(`Speed: ${s===1?'Normal':s+'×'}`);closeAll();
    });
    spl.appendChild(el);
  });

  // ── SUBTITLES ─────────────────────────────────────
  async function loadSub(u,label,idx){
    try{
      const txt=await(await fetch(u)).text();
      const blob=new Blob([txt],{type:'text/vtt'});
      const tr=document.createElement('track');
      tr.kind='subtitles';tr.label=label;tr.src=URL.createObjectURL(blob);tr.srclang='und';
      vid.appendChild(tr);
      const el=document.createElement('div');
      el.className='pr';el.dataset.track=idx;
      el.innerHTML=`<span>${label}</span><div class="dot"></div>`;
      el.addEventListener('click',()=>selTrack(idx,el));
      cl.appendChild(el);
      parseVTT(txt,idx);
    }catch(e){console.warn('Sub fail',u)}
  }

  function selTrack(idx,el){
    activeTrack=idx;
    cl.querySelectorAll('.pr').forEach(r=>r.classList.remove('on'));
    if(el)el.classList.add('on');
    for(let i=0;i<vid.textTracks.length;i++)vid.textTracks[i].mode=i===idx?'hidden':'disabled';
    cap.style.display=idx>=0?'block':'none';
    if(idx<0)cap.textContent='';
    closeAll();
  }

  cl.querySelector('[data-track="-1"]').addEventListener('click',function(){selTrack(-1,this)});

  function parseVTT(txt,idx){
    const cues=[];
    txt.split(/\n\n+/).forEach(block=>{
      const lines=block.trim().split('\n');
      const tl=lines.find(l=>l.includes('-->'));if(!tl)return;
      const[s,e]=tl.split('-->').map(x=>vttT(x.trim()));
      cues.push({start:s,end:e,text:lines.slice(lines.indexOf(tl)+1).join('\n').replace(/<[^>]+>/g,'')});
    });
    capLines[idx]=cues;
  }
  function vttT(s){const p=s.split(/[:,]/).map(Number);return p.length>=3?p[0]*3600+p[1]*60+(p[2]+(p[3]||0)/1000):p[0]*60+p[1]}

  if(subs.length)subs.forEach((u,i)=>loadSub(u.trim(),names[i]||`Track ${i+1}`,i));
  else{bcc.style.opacity='.3';bcc.style.pointerEvents='none'}

  // ── MARKERS ──────────────────────────────────────
  function buildMarkers(){
    if(!dur)return;
    pr.querySelectorAll('.seg,.sl').forEach(e=>e.remove());
    function addSeg(s,e,cls,lbl){
      if(isNaN(s)||isNaN(e)||!isFinite(s))return;
      const ps2=s/dur*100,pw2=(e-s)/dur*100;
      const seg=document.createElement('div');
      seg.className=`seg ${cls}`;seg.style.left=ps2+'%';seg.style.width=pw2+'%';
      pr.appendChild(seg);
      const ld=document.createElement('div');
      ld.className=`sl ${cls}`;ld.textContent=lbl;ld.style.left=(ps2+pw2/2)+'%';
      pr.appendChild(ld);
    }
    addSeg(introStart,introEnd,'intro','Intro');
    addSeg(outroStart,outroEnd,'outro','Outro');
  }

  // ── TIME FMT ──────────────────────────────────────
  function fmt(s){
    if(!isFinite(s)||isNaN(s))return'0:00';
    const h=Math.floor(s/3600),m=Math.floor(s%3600/60),sec=Math.floor(s%60);
    return h?`${h}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`:`${m}:${String(sec).padStart(2,'0')}`;
  }

  // ── VIDEO EVENTS ─────────────────────────────────
  vid.addEventListener('loadedmetadata',()=>{dur=vid.duration;buildMarkers()});
  vid.addEventListener('durationchange',()=>{dur=vid.duration;buildMarkers()});

  vid.addEventListener('timeupdate',()=>{
    const ct=vid.currentTime;if(!dur)return;
    const pct=ct/dur*100;
    pf.style.width=pct+'%';pt.style.left=pct+'%';
    tt.textContent=`${fmt(ct)} / ${fmt(dur)}`;

    if(activeTrack>=0&&capLines[activeTrack]){
      const c=capLines[activeTrack].find(x=>ct>=x.start&&ct<=x.end);
      cap.textContent=c?c.text:'';
    }

    const inI=!isNaN(introStart)&&ct>=introStart&&ct<introEnd;
    const inO=!isNaN(outroStart)&&ct>=outroStart&&ct<outroEnd;
    if(inI){
      skipBtn.textContent='Skip Intro →';skipBtn.style.display='block';
      if(csi.checked&&!introDone){introDone=true;vid.currentTime=introEnd}
    } else if(inO){
      skipBtn.textContent='Skip Outro →';skipBtn.style.display='block';
      if(cso.checked&&!outroDone){outroDone=true;vid.currentTime=outroEnd}
    } else skipBtn.style.display='none';

    if(ct<(introStart||0))introDone=false;
    if(ct<(outroStart||0))outroDone=false;
  });

  vid.addEventListener('progress',()=>{
    if(!dur)return;
    let b=0;
    for(let i=0;i<vid.buffered.length;i++)if(vid.buffered.start(i)<=vid.currentTime)b=Math.max(b,vid.buffered.end(i));
    pb.style.width=(b/dur*100)+'%';
  });

  vid.addEventListener('play',()=>setP(false));
  vid.addEventListener('pause',()=>setP(true));
  vid.addEventListener('waiting',()=>spin.style.display='block');
  vid.addEventListener('playing',()=>spin.style.display='none');
  vid.addEventListener('canplay',()=>spin.style.display='none');

  function setP(paused){
    const s=paused?'<polygon points="5,3 19,12 5,21"/>':'<line x1="6" y1="4" x2="6" y2="20"/><line x1="18" y1="4" x2="18" y2="20"/>';
    icp.innerHTML=s;cfi.innerHTML=s;
  }

  // ── PLAY ────────────────────────────────────────
  function play(){if(vid.paused)vid.play();else vid.pause();popCF()}
  function popCF(){cf.classList.add('pop');setTimeout(()=>cf.classList.remove('pop'),650)}

  bp.addEventListener('click',play);
  vid.addEventListener('click',()=>{play();showUI()});

  // ── SEEK ────────────────────────────────────────
  function railPct(e){const r=pr.getBoundingClientRect();return Math.max(0,Math.min(1,(e.clientX-r.left)/r.width))}

  pw.addEventListener('mousedown',e=>{dragging=true;pw.classList.add('drag');vid.currentTime=railPct(e)*dur;e.preventDefault()});
  window.addEventListener('mousemove',e=>{if(!dragging)return;const r=pr.getBoundingClientRect();vid.currentTime=Math.max(0,Math.min(1,(e.clientX-r.left)/r.width))*dur});
  window.addEventListener('mouseup',()=>{dragging=false;pw.classList.remove('drag')});
  pw.addEventListener('mousemove',e=>{const p=railPct(e);ptip.style.left=(p*100)+'%';ptip.textContent=fmt(p*dur)});

  // Touch seek
  pw.addEventListener('touchstart',e=>{dragging=true;pw.classList.add('drag');tseek(e.touches[0]);e.preventDefault()},{passive:false});
  pw.addEventListener('touchmove',e=>{if(dragging)tseek(e.touches[0]);e.preventDefault()},{passive:false});
  pw.addEventListener('touchend',()=>{dragging=false;pw.classList.remove('drag')});
  function tseek(t){const r=pr.getBoundingClientRect();vid.currentTime=Math.max(0,Math.min(1,(t.clientX-r.left)/r.width))*dur}

  function seek(s){
    vid.currentTime=Math.max(0,Math.min(dur||Infinity,vid.currentTime+s));
    flash(s>0?`+${s}s`:`${s}s`);
    // show seek flash
    const el=s>0?sfr:sfl;
    el.classList.add('show');
    setTimeout(()=>el.classList.remove('show'),350);
  }

  skipBtn.addEventListener('click',()=>{
    if(!isNaN(introEnd)&&vid.currentTime>=introStart&&vid.currentTime<introEnd){vid.currentTime=introEnd;introDone=true}
    else if(!isNaN(outroEnd)){vid.currentTime=outroEnd;outroDone=true}
  });

  brw.addEventListener('click',()=>seek(-10));
  bff.addEventListener('click',()=>seek(10));

  // ── TAP ZONES ─────────────────────────────────────
  function setupZone(zoneId, dir) {
    const zone = $(zoneId);
    let taps=0, tapT=null;
    zone.addEventListener('click', e => {
      e.stopPropagation();
      taps++;
      clearTimeout(tapT);
      tapT = setTimeout(() => {
        if (taps >= 2) seek(dir * 10);
        else play();
        taps = 0;
      }, 230);
    });
  }
  setupZone('tz-l', -1);
  setupZone('tz-r', 1);

  // ── VOLUME (mute only) ────────────────────────────
  bm.addEventListener('click',()=>{vid.muted=!vid.muted;updVol();flash(vid.muted?'Muted':'Unmuted')});

  function updVol(){
    const v=vid.muted?0:vid.volume;
    vp.setAttribute('points','11,5 6,9 2,9 2,15 6,15 11,19');
    if(v===0)vw.setAttribute('d','M23 9l-6 6M17 9l6 6');
    else if(v<.5)vw.setAttribute('d','M15.54 8.46a5 5 0 0 1 0 7.07');
    else vw.setAttribute('d','M15.54 8.46a5 5 0 0 1 0 7.07M19.07 4.93a10 10 0 0 1 0 14.14');
  }

  // ── FULLSCREEN + ORIENTATION ──────────────────────
  bfs.addEventListener('click',toggleFS);
  async function toggleFS(){
    const fs=document.fullscreenElement||document.webkitFullscreenElement;
    if(!fs){
      try{
        await (shell.requestFullscreen||shell.webkitRequestFullscreen).call(shell);
        // Lock to landscape on mobile
        if(screen.orientation&&screen.orientation.lock){
          screen.orientation.lock('landscape').catch(()=>{});
        }
      }catch(e){}
    } else {
      try{
        await (document.exitFullscreen||document.webkitExitFullscreen).call(document);
        if(screen.orientation&&screen.orientation.unlock)screen.orientation.unlock();
      }catch(e){}
    }
  }

  ['fullscreenchange','webkitfullscreenchange'].forEach(ev=>document.addEventListener(ev,()=>{
    const inFS=!!(document.fullscreenElement||document.webkitFullscreenElement);
    ifs.innerHTML=inFS
      ?'<polyline points="4,14 10,14 10,20"/><polyline points="20,10 14,10 14,4"/><line x1="10" y1="14" x2="3" y2="21"/><line x1="21" y1="3" x2="14" y2="10"/>'
      :'<polyline points="15,3 21,3 21,9"/><polyline points="9,21 3,21 3,15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/>';
    if(!inFS&&screen.orientation&&screen.orientation.unlock)screen.orientation.unlock();
  }));

  // ── PiP ─────────────────────────────────────────
  $('rpip').addEventListener('click',()=>{
    if(document.pictureInPictureElement)document.exitPictureInPicture();
    else if(document.pictureInPictureEnabled)vid.requestPictureInPicture();
    closeAll();
  });

  // ── POPUPS ──────────────────────────────────────
  function closeAll(){
    ps.classList.remove('open');bs.classList.remove('lit');
    pc.classList.remove('open');bcc.classList.remove('lit');
  }

  bs.addEventListener('click',e=>{
    e.stopPropagation();
    pc.classList.remove('open');bcc.classList.remove('lit');
    const willOpen=!ps.classList.contains('open');
    closeAll();
    if(willOpen){
      ps.classList.add('open');bs.classList.add('lit');
      // Position after display:flex
      requestAnimationFrame(()=>positionPopup(ps,bs));
    }
  });

  bcc.addEventListener('click',e=>{
    e.stopPropagation();
    ps.classList.remove('open');bs.classList.remove('lit');
    const willOpen=!pc.classList.contains('open');
    closeAll();
    if(willOpen){
      pc.classList.add('open');bcc.classList.add('lit');
      requestAnimationFrame(()=>positionPopup(pc,bcc));
    }
  });

  shell.addEventListener('click',e=>{if(!e.target.closest('.pop')&&!e.target.closest('.btn'))closeAll()});
  ps.addEventListener('click',e=>e.stopPropagation());
  pc.addEventListener('click',e=>e.stopPropagation());

  // Reposition on resize/rotate
  window.addEventListener('resize',()=>{
    if(ps.classList.contains('open'))positionPopup(ps,bs);
    if(pc.classList.contains('open'))positionPopup(pc,bcc);
  });

  // ── UI SHOW/HIDE ─────────────────────────────────
  function showUI(){
    grad.classList.add('on');cw.classList.add('active');shell.classList.add('cur');
    clearTimeout(hideT);
    hideT=setTimeout(()=>{
      if(!vid.paused&&!ps.classList.contains('open')&&!pc.classList.contains('open')){
        grad.classList.remove('on');cw.classList.remove('active');shell.classList.remove('cur');
      }
    },3500);
  }
  shell.addEventListener('mousemove',showUI);
  shell.addEventListener('touchstart',showUI,{passive:true});
  shell.addEventListener('mouseleave',()=>{if(!vid.paused)grad.classList.remove('on'),cw.classList.remove('active'),shell.classList.remove('cur')});
  vid.addEventListener('pause',showUI);

  // ── KEYBOARD ─────────────────────────────────────
  function flash(msg){kf.textContent=msg;kf.classList.add('on');clearTimeout(kT);kT=setTimeout(()=>kf.classList.remove('on'),1400)}

  document.addEventListener('keydown',e=>{
    if(['INPUT','TEXTAREA','SELECT'].includes(e.target.tagName))return;
    showUI();
    switch(e.key){
      case' ':case'k':case'K':e.preventDefault();play();break;
      case'ArrowRight':case'l':case'L':e.preventDefault();seek(e.shiftKey?30:10);break;
      case'ArrowLeft': case'j':case'J':e.preventDefault();seek(e.shiftKey?-30:-10);break;
      case'ArrowUp':  e.preventDefault();vid.volume=Math.min(1,vid.volume+.1);vid.muted=false;updVol();flash(`Volume ${Math.round(vid.volume*100)}%`);break;
      case'ArrowDown':e.preventDefault();vid.volume=Math.max(0,vid.volume-.1);updVol();flash(`Volume ${Math.round(vid.volume*100)}%`);break;
      case'm':case'M':vid.muted=!vid.muted;updVol();flash(vid.muted?'Muted':'Unmuted');break;
      case'f':case'F':toggleFS();break;
      case'0':case'1':case'2':case'3':case'4':
      case'5':case'6':case'7':case'8':case'9':
        if(dur){vid.currentTime=parseInt(e.key)/10*dur;flash(`Seek: ${e.key}0%`)}break;
      case'Home':vid.currentTime=0;flash('Start');break;
      case'End':if(dur){vid.currentTime=dur;flash('End')}break;
      case'c':case'C':
        if(pc.classList.contains('open'))closeAll();
        else{closeAll();pc.classList.add('open');bcc.classList.add('lit');requestAnimationFrame(()=>positionPopup(pc,bcc))}break;
      case's':case'S':
        if(ps.classList.contains('open'))closeAll();
        else{closeAll();ps.classList.add('open');bs.classList.add('lit');requestAnimationFrame(()=>positionPopup(ps,bs))}break;
      case'i':case'I':
        if(!isNaN(introEnd)&&vid.currentTime>=introStart&&vid.currentTime<introEnd){vid.currentTime=introEnd;introDone=true;flash('Skipped Intro')}break;
      case'p':case'P':
        if(document.pictureInPictureEnabled){
          document.pictureInPictureElement?document.exitPictureInPicture():vid.requestPictureInPicture();
        }break;
      case'>':case'.':vid.playbackRate=Math.min(2,+(vid.playbackRate+.25).toFixed(2));flash(`Speed: ${vid.playbackRate}×`);break;
      case'<':case',':vid.playbackRate=Math.max(.25,+(vid.playbackRate-.25).toFixed(2));flash(`Speed: ${vid.playbackRate}×`);break;
    }
  });

  showUI();
}
</script>
</body>
</html>
