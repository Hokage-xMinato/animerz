<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Simple M3U8 Player</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <style>
    body { margin: 0; background: black; display: flex; justify-content: center; align-items: center; height: 100vh; }
    video { width: 90%; max-width: 1000px; height: auto; }
  </style>
</head>
<body>

<video id="video" controls autoplay></video>

<script>
  const params = new URLSearchParams(window.location.search);
  const videoSrc = params.get("url");
  const subsParam = params.get("subs");  
  const namesParam = params.get("names"); 
  const video = document.getElementById("video");

  if (!videoSrc) {
    alert("No ?url= parameter provided");
    throw new Error("Missing url parameter");
  }

  // --- BRAIN-SURGERY SUBTITLE LOADING ---
  async function loadExternalSubs(url, label) {
    try {
      const response = await fetch(url);
      const text = await response.text();
      // Create a local blob so the browser doesn't block it
      const blob = new Blob([text], { type: 'text/vtt' });
      const blobUrl = URL.createObjectURL(blob);
      
      const track = document.createElement("track");
      track.kind = "subtitles";
      track.label = label;
      track.src = blobUrl;
      track.srclang = "en";
      video.appendChild(track);
    } catch (e) {
      console.error("Could not load subtitle file via fetch:", url);
    }
  }

  if (subsParam) {
    const urls = subsParam.split(",");
    const names = namesParam ? namesParam.split(",") : [];
    urls.forEach((url, index) => {
      loadExternalSubs(url, names[index] || `Subtitle ${index + 1}`);
    });
  }

  // --- YOUR ORIGINAL WORKING LOGIC ---
  if (video.canPlayType('application/vnd.apple.mpegurl')) {
    video.src = videoSrc;
  } else if (Hls.isSupported()) {
    const hls = new Hls();
    hls.loadSource(videoSrc);
    hls.attachMedia(video);
  } else {
    alert("HLS not supported in this browser.");
  }
</script>

</body>
</html>
