<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro M3U8 Player</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 10px; }
        .wrapper { width: 100%; max-width: 900px; }
        video { width: 100%; aspect-ratio: 16/9; background: #111; border-radius: 8px; }
        .controls { margin-top: 15px; display: flex; flex-wrap: wrap; gap: 10px; align-items: center; background: #1a1a1a; padding: 15px; border-radius: 8px; }
        select { background: #333; color: #fff; border: 1px solid #555; padding: 8px; border-radius: 5px; flex-grow: 1; }
        #log { margin-top: 10px; font-size: 11px; color: #666; font-family: monospace; width: 100%; }
    </style>
</head>
<body>

<div class="wrapper">
    <video id="video" controls autoplay playsinline></video>
    
    <div class="controls">
        <label>Quality:</label>
        <select id="qualitySelect"><option>Loading...</option></select>
    </div>

    <div id="log">Status: Waiting for URL...</div>
</div>

<script>
    const video = document.getElementById('video');
    const qualitySelect = document.getElementById('qualitySelect');
    const logBox = document.getElementById('log');

    const params = new URLSearchParams(window.location.search);
    const videoSrc = params.get("url");
    const subsParam = params.get("subs");
    const namesParam = params.get("names");

    function log(msg) { logBox.innerHTML = `> ${msg}<br>` + logBox.innerHTML; }

    // --- SUBTITLE NEUTRALIZER (Blob Method) ---
    async function loadSubs(url, label) {
        try {
            log(`Fetching subtitle: ${label}`);
            const resp = await fetch(url);
            if (!resp.ok) throw new Error("Fetch failed");
            const text = await resp.text();
            const blob = new Blob([text], { type: 'text/vtt' });
            const blobUrl = URL.createObjectURL(blob);
            
            const track = document.createElement("track");
            track.kind = "subtitles";
            track.label = label;
            track.src = blobUrl;
            track.srclang = "en";
            video.appendChild(track);
            log(`Success: Subtitle ${label} injected.`);
        } catch (e) {
            log(`Error: Subtitle ${label} blocked or missing.`);
        }
    }

    if (videoSrc) {
        if (Hls.isSupported()) {
            log("Initialising Hls.js engine...");
            const hls = new Hls({
                xhrSetup: function(xhr) { xhr.withCredentials = false; }
            });

            hls.loadSource(videoSrc);
            hls.attachMedia(video);

            hls.on(Hls.Events.MANIFEST_PARSED, (event, data) => {
                log("Manifest Parsed. Qualities: " + data.levels.length);
                
                // Build Quality UI
                qualitySelect.innerHTML = '<option value="-1">Auto (ABR)</option>';
                data.levels.forEach((level, index) => {
                    const opt = document.createElement('option');
                    opt.value = index;
                    const res = level.height ? `${level.height}p` : `${Math.round(level.bitrate/1000)}k`;
                    opt.text = res;
                    qualitySelect.appendChild(opt);
                });

                // Load Subtitles after manifest
                if (subsParam) {
                    const urls = subsParam.split(",");
                    const names = namesParam ? namesParam.split(",") : [];
                    urls.forEach((u, i) => loadSubs(u, names[i] || `Track ${i+1}`));
                }
                
                video.play().catch(() => log("Autoplay blocked. Tap Play."));
            });

            qualitySelect.onchange = () => {
                hls.currentLevel = parseInt(qualitySelect.value);
                log("Manual Quality Set: " + qualitySelect.options[qualitySelect.selectedIndex].text);
            };

            hls.on(Hls.Events.ERROR, (event, data) => {
                if (data.fatal) log("FATAL: " + data.details);
            });

        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            // Safari/iOS Fallback
            video.src = videoSrc;
            log("Using Native Fallback (No Quality Selector Available)");
        }
    } else {
        log("ERROR: No ?url= provided.");
    }
</script>
</body>
</html>
