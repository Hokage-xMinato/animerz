<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HLS Quality Selector</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: #1a1a1a; color: white; }
        .video-container { width: 80%; max-width: 800px; margin-top: 20px; }
        video { width: 100%; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .controls { margin-top: 15px; background: #333; padding: 10px; border-radius: 5px; }
        select { padding: 5px 10px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

    <h2>HLS Player with Quality Control</h2>

    <div class="video-container">
        <video id="video" controls></video>
        
        <div class="controls">
            <label for="qualitySelect">Quality: </label>
            <select id="qualitySelect">
                <option value="-1">Auto (Adaptive)</option>
            </select>
        </div>
    </div>

    <script>
        const video = document.getElementById('video');
        const qualitySelect = document.getElementById('qualitySelect');
        // Example M3U8 link with multiple qualities (Mux test stream)
        const videoSrc = 'https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8';

        if (Hls.isSupported()) {
            const hls = new Hls();
            hls.loadSource(videoSrc);
            hls.attachMedia(video);

            // 1. Listen for when the manifest is parsed to see available qualities
            hls.on(Hls.Events.MANIFEST_PARSED, function (event, data) {
                // data.levels contains the different quality levels
                data.levels.forEach((level, index) => {
                    const option = document.createElement('option');
                    option.value = index;
                    // Show resolution (e.g., 1080p) or bitrate
                    const label = level.height ? `${level.height}p` : `${Math.round(level.bitrate / 1000)} kbps`;
                    option.text = label;
                    qualitySelect.appendChild(option);
                });
                
                video.play();
            });

            // 2. Handle Manual Quality Change
            qualitySelect.addEventListener('change', () => {
                // -1 is "Auto", otherwise it's the index of the level
                hls.currentLevel = parseInt(qualitySelect.value);
                console.log("Switching quality to level:", hls.currentLevel);
            });

        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            // For Safari (Native HLS support), manual selection is usually handled by the OS
            video.src = videoSrc;
            video.addEventListener('loadedmetadata', () => video.play());
        }
    </script>
</body>
</html>
