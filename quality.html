<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Android Native Direct Player</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; text-align: center; }
        video { width: 100%; max-width: 800px; background: #111; margin-top: 20px; }
        .controls { margin: 20px; padding: 15px; background: #222; border-radius: 8px; }
        select { width: 80%; padding: 10px; font-size: 16px; }
        #status { color: #888; font-size: 12px; margin-top: 10px; }
    </style>
</head>
<body>

    <video id="video" controls autoplay playsinline></video>
    
    <div class="controls">
        <p>Quality Selector</p>
        <select id="qualitySelect">
            <option>Loading Stream...</option>
        </select>
        <div id="status">Checking stream access...</div>
    </div>

<script>
    const video = document.getElementById('video');
    const selector = document.getElementById('qualitySelect');
    const status = document.getElementById('status');

    const params = new URLSearchParams(window.location.search);
    const videoSrc = params.get("url");

    if (!videoSrc) {
        status.innerText = "Error: No URL provided in ?url=";
    } else {
        startPlaying();
    }

    async function startPlaying() {
        // 1. Set the video source immediately to let the browser handle the handshake
        video.src = videoSrc;
        status.innerText = "Attempting native handshake...";

        // 2. Try to "Peek" into the file to see if we can find qualities
        try {
            const response = await fetch(videoSrc);
            if (!response.ok) throw new Error("CORS Blocked");
            
            const text = await response.text();
            status.innerText = "Manifest read success! Parsing levels...";
            parseManifest(text, videoSrc);
        } catch (e) {
            status.innerText = "CORS Blocked Quality Manual Selection. Playing in Auto Mode.";
            selector.innerHTML = '<option>Auto (Adaptive Only)</option>';
        }
    }

    function parseManifest(text, baseUrl) {
        const lines = text.split('\n');
        selector.innerHTML = '<option value="' + baseUrl + '">Auto (Default)</option>';
        
        // Simple manual parser for M3U8 lines
        for (let i = 0; i < lines.length; i++) {
            if (lines[i].includes('#EXT-X-STREAM-INF')) {
                const metadata = lines[i];
                const url = lines[i+1];
                
                // Get Resolution
                const resMatch = metadata.match(/RESOLUTION=(\d+x\d+)/);
                const resolution = resMatch ? resMatch[1].split('x')[1] + 'p' : "Unknown";
                
                const opt = document.createElement('option');
                // Handle relative vs absolute URLs
                opt.value = url.startsWith('http') ? url : new URL(url, baseUrl).href;
                opt.text = resolution;
                selector.appendChild(opt);
            }
        }
    }

    selector.onchange = () => {
        const currentTime = video.currentTime;
        video.src = selector.value;
        video.currentTime = currentTime;
        video.play();
    };
</script>
</body>
</html>
