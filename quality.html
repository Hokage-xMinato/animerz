<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>HLS Quality Selector</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body style="background:#111;color:white;text-align:center;font-family:sans-serif;">

<h2>HLS Player</h2>

<video id="video" controls width="800"></video>
<br><br>

<select id="quality">
  <option value="-1">Auto</option>
</select>

<script>
  const video = document.getElementById("video");
  const qualitySelect = document.getElementById("quality");

  const src = "https://dt.netmagcdn.com:2228/hls-playback/f7aea34d2bbe09b962858c9fefd4600b7f6dc326a95edd1cf5cb2075981004af85abcf2724596b251b7cd0cc21f2b8850acdccb6cbec0c36dd90d7bd483722543d490fba70ed84e4b2c6f4fe94a8ff0ed0a0f9175df207c7e3189e093673769cbc8dd5b05b82637caf88749b24af9ee0288a7fbfb3711a2dbcb8a4e82f43b3a772364e2e1014740bde5f6fe60e23716d/master.m3u8"; // replace

  if (Hls.isSupported()) {
    const hls = new Hls({
      xhrSetup: function(xhr) {
        // Do NOT set withCredentials unless needed
      }
    });

    hls.loadSource(src);
    hls.attachMedia(video);

    hls.on(Hls.Events.MANIFEST_PARSED, function() {

      hls.levels.forEach((level, index) => {
        const option = document.createElement("option");
        option.value = index;
        option.textContent = level.height 
          ? level.height + "p"
          : Math.round(level.bitrate/1000) + " kbps";

        qualitySelect.appendChild(option);
      });

      video.play();
    });

    qualitySelect.addEventListener("change", function() {
      hls.currentLevel = parseInt(this.value);
    });

  } else if (video.canPlayType("application/vnd.apple.mpegurl")) {
    video.src = src;
    video.play();
  } else {
    alert("HLS not supported");
  }
</script>

</body>
</html>
