<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Simple M3U8 Player</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <style>
    body {
      margin: 0;
      background: black;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: white;
      font-family: Arial;
    }
    video {
      width: 90%;
      max-width: 1000px;
      height: auto;
    }
    select {
      margin-top: 15px;
      padding: 6px 10px;
      font-size: 16px;
      background: #111;
      color: white;
      border: 1px solid #444;
    }
  </style>
</head>
<body>

<video id="video" controls autoplay></video>
<select id="quality" style="display:none;">
  <option value="-1">Auto</option>
</select>

<script>
  const params = new URLSearchParams(window.location.search);
  const videoSrc = params.get("url");
  const video = document.getElementById("video");
  const qualitySelect = document.getElementById("quality");

  if (!videoSrc) {
    alert("No ?url= parameter provided");
    throw new Error("Missing url parameter");
  }

  if (video.canPlayType('application/vnd.apple.mpegurl')) {
    // Safari native HLS
    video.src = videoSrc;
    // Safari does not allow manual quality control
  } 
  else if (Hls.isSupported()) {
    const hls = new Hls();

    hls.loadSource(videoSrc);
    hls.attachMedia(video);

    hls.on(Hls.Events.MANIFEST_PARSED, function () {

      // If only one level, no need to show selector
      if (hls.levels.length <= 1) return;

      qualitySelect.style.display = "block";

      // Add quality options
      hls.levels.forEach((level, index) => {
        const option = document.createElement("option");
        option.value = index;

        const label = level.height
          ? level.height + "p"
          : Math.round(level.bitrate / 1000) + " kbps";

        option.textContent = label;
        qualitySelect.appendChild(option);
      });

      video.play();
    });

    // Manual switching
    qualitySelect.addEventListener("change", function () {
      hls.currentLevel = parseInt(this.value);
    });

  } 
  else {
    alert("HLS not supported in this browser.");
  }
</script>

</body>
</html>
