<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Simple M3U8 Player</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <style>
    body {
      margin: 0;
      background: black;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: white;
      font-family: Arial;
    }
    video {
      width: 90%;
      max-width: 1000px;
      height: auto;
    }
    select {
      margin-top: 15px;
      padding: 6px 10px;
      font-size: 16px;
      background: #111;
      color: white;
      border: 1px solid #444;
    }
  </style>
</head>
<body>

<video id="video" controls autoplay></video>
<select id="quality" style="display:none;">
  <option value="-1">Auto</option>
</select>

<script>
  <script>
  const params = new URLSearchParams(window.location.search);
  const videoSrc = params.get("url");
  const video = document.getElementById("video");

  // Create selector dynamically
  const qualitySelect = document.createElement("select");
  qualitySelect.style.marginTop = "15px";
  qualitySelect.style.padding = "6px";
  document.body.appendChild(qualitySelect);

  if (!videoSrc) {
    alert("No ?url= parameter provided");
    throw new Error("Missing url parameter");
  }

  if (video.canPlayType('application/vnd.apple.mpegurl')) {
    video.src = videoSrc;
  } 
  else if (Hls.isSupported()) {
    const hls = new Hls({
      debug: false
    });

    hls.loadSource(videoSrc);
    hls.attachMedia(video);

    hls.on(Hls.Events.MANIFEST_PARSED, function () {

      console.log("Levels detected:", hls.levels);

      // Always clear
      qualitySelect.innerHTML = "";

      // Add Auto option
      const autoOption = document.createElement("option");
      autoOption.value = -1;
      autoOption.textContent = "Auto";
      qualitySelect.appendChild(autoOption);

      // Add all levels
      hls.levels.forEach((level, index) => {
        const option = document.createElement("option");
        option.value = index;
        option.textContent = level.height + "p";
        qualitySelect.appendChild(option);
      });

      video.play();
    });

    qualitySelect.addEventListener("change", function () {
      hls.currentLevel = parseInt(this.value);
    });

  } 
  else {
    alert("HLS not supported in this browser.");
  }
</script>
</script>

</body>
</html>
