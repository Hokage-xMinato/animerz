<!DOCTYPE html>
<html>
<head>
    <title>Manual Manifest Injector</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; padding: 20px; }
        video { width: 100%; max-width: 600px; border: 1px solid #333; }
        textarea { width: 100%; height: 100px; background: #222; color: #0f0; border: 1px solid #444; margin: 10px 0; }
        button { padding: 10px; background: #28a745; color: white; border: none; cursor: pointer; border-radius: 5px; }
        select { margin-top: 10px; padding: 10px; width: 100%; }
    </style>
</head>
<body>

    <video id="video" controls></video>

    <div id="setup">
        <h3>Paste M3U8 Source Text Here:</h3>
        <textarea id="m3u8Text" placeholder="#EXTM3U..."></textarea>
        <button onclick="injectManifest()">Generate Quality List</button>
    </div>

    <select id="qualitySelect" style="display:none;"></select>

<script>
    const video = document.getElementById('video');
    const params = new URLSearchParams(window.location.search);
    const videoSrc = params.get("url"); // The master link

    function injectManifest() {
        const text = document.getElementById('m3u8Text').value;
        const selector = document.getElementById('qualitySelect');
        const lines = text.split('\n');
        
        selector.innerHTML = '<option value="' + videoSrc + '">Auto (Original)</option>';
        
        for (let i = 0; i < lines.length; i++) {
            if (lines[i].includes('#EXT-X-STREAM-INF')) {
                const metadata = lines[i];
                let url = lines[i+1].trim();
                
                // Fix relative URLs
                if (!url.startsWith('http')) {
                    const baseUrl = videoSrc.substring(0, videoSrc.lastIndexOf('/') + 1);
                    url = baseUrl + url;
                }

                const resMatch = metadata.match(/RESOLUTION=(\d+x\d+)/);
                const label = resMatch ? resMatch[1].split('x')[1] + 'p' : "Level " + i;

                const opt = document.createElement('option');
                opt.value = url;
                opt.text = label;
                selector.appendChild(opt);
            }
        }
        
        selector.style.display = 'block';
        document.getElementById('setup').style.display = 'none';
        video.src = videoSrc;
        video.play();
    }

    document.getElementById('qualitySelect').onchange = function() {
        const time = video.currentTime;
        video.src = this.value;
        video.currentTime = time;
        video.play();
    };
</script>
</body>
</html>
