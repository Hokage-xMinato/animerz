<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fixed Manual Quality Player</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .wrapper { width: 100%; max-width: 800px; }
        video { width: 100%; border-radius: 8px; background: #111; border: 1px solid #333; }
        textarea { width: 100%; height: 100px; background: #222; color: #0f0; border: 1px solid #444; margin: 10px 0; padding: 10px; box-sizing: border-box; }
        .controls { margin-top: 10px; display: none; }
        select { width: 100%; padding: 12px; font-size: 16px; background: #333; color: #fff; border: 1px solid #555; }
        button { width: 100%; padding: 10px; background: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        #status { font-size: 12px; color: #888; margin-top: 10px; }
    </style>
</head>
<body>

<div class="wrapper">
    <video id="video" controls autoplay playsinline></video>
    
    <div id="setup">
        <p>Paste the #EXTM3U text here to fix the broken quality links:</p>
        <textarea id="m3u8Text" placeholder="#EXTM3U..."></textarea>
        <button onclick="fixAndPlay()">Fix & Unlock Qualities</button>
    </div>

    <div class="controls" id="controls">
        <label>Select Quality:</label>
        <select id="qualitySelect"></select>
        <div id="status">Ready to switch.</div>
    </div>
</div>

<script>
    const video = document.getElementById('video');
    const selector = document.getElementById('qualitySelect');
    const status = document.getElementById('status');

    const params = new URLSearchParams(window.location.search);
    const masterUrl = params.get("url");

    if (masterUrl) {
        video.src = masterUrl; // Play auto initially
    }

    function fixAndPlay() {
        const text = document.getElementById('m3u8Text').value;
        const lines = text.split('\n');
        
        // --- THE FIX: GET THE BASE URL ---
        // Takes "https://site.com/hls/master.m3u8" 
        // and returns "https://site.com/hls/"
        const baseDir = masterUrl.substring(0, masterUrl.lastIndexOf('/') + 1);
        
        selector.innerHTML = '';
        selector.add(new Option("Auto (Adaptive)", masterUrl));

        for (let i = 0; i < lines.length; i++) {
            const line = lines[i].trim();
            if (line.includes('#EXT-X-STREAM-INF')) {
                // Find the next line that is the URL
                let subUrl = "";
                for (let j = i + 1; j < lines.length; j++) {
                    if (lines[j].trim() && !lines[j].startsWith('#')) {
                        subUrl = lines[j].trim();
                        break;
                    }
                }

                if (subUrl) {
                    // --- GLUE THE BASE URL TO THE FILENAME ---
                    const finalUrl = subUrl.startsWith('http') ? subUrl : baseDir + subUrl;
                    
                    const resMatch = line.match(/RESOLUTION=(\d+x\d+)/);
                    const label = resMatch ? resMatch[1].split('x')[1] + 'p' : "Manual";

                    selector.add(new Option(label, finalUrl));
                }
            }
        }

        document.getElementById('setup').style.display = 'none';
        document.getElementById('controls').style.display = 'block';
        status.innerText = "Links Repaired. You can now switch qualities.";
    }

    selector.onchange = () => {
        const time = video.currentTime;
        const paused = video.paused;
        video.src = selector.value;
        video.currentTime = time;
        if (!paused) video.play();
        status.innerText = "Playing: " + selector.options[selector.selectedIndex].text;
    };
</script>

</body>
</html>
