<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate M3U8 Player</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { 
            margin: 0; 
            background: #0a0a0a; 
            color: #eee; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
        }
        .player-wrapper { width: 95%; max-width: 900px; background: #1a1a1a; padding: 15px; border-radius: 12px; box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
        video { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 6px; }
        .controls { margin-top: 15px; display: flex; align-items: center; gap: 12px; font-size: 14px; }
        select { background: #333; color: #fff; border: 1px solid #444; padding: 6px 10px; border-radius: 4px; cursor: pointer; outline: none; }
        select:hover { background: #444; }
        #status-log { margin-top: 15px; font-family: monospace; font-size: 11px; color: #888; text-align: left; width: 100%; max-height: 60px; overflow-y: auto; }
    </style>
</head>
<body>

<div class="player-wrapper">
    <video id="video" controls autoplay playsinline></video>
    
    <div class="controls">
        <span>Quality Setting:</span>
        <select id="qualitySelect">
            <option value="-1">Auto (ABR)</option>
        </select>
    </div>

    <div id="status-log">Initializing...</div>
</div>

<script>
    const video = document.getElementById('video');
    const selector = document.getElementById('qualitySelect');
    const logger = document.getElementById('status-log');

    function log(msg) {
        console.log(msg);
        logger.innerHTML = `> ${msg}<br>` + logger.innerHTML;
    }

    const params = new URLSearchParams(window.location.search);
    const videoSrc = params.get("url");

    if (!videoSrc) {
        log("ERROR: No ?url= found in URL parameters.");
    } else {
        log("Targeting: " + videoSrc);
        initPlayer();
    }

    function initPlayer() {
        // --- STEP 1: CHECK FOR NATIVE M3U8 SUPPORT (Safari/Mobile) ---
        // Native is more "forgiving" with CORS and server crashes
        if (video.canPlayType('application/vnd.apple.mpegurl')) {
            log("Native HLS detected (Safari/iOS). Loading directly...");
            video.src = videoSrc;
            
            // Native doesn't expose quality levels to JS easily, so we hide selector
            selector.parentElement.style.display = 'none';
            
            video.addEventListener('loadedmetadata', () => video.play());
            video.addEventListener('error', () => {
                log("Native playback failed. Trying HLS.js fallback...");
                setupHlsJs();
            });
        } 
        // --- STEP 2: USE HLS.JS FOR CHROME/FIREFOX/EDGE ---
        else if (Hls.isSupported()) {
            setupHlsJs();
        } else {
            log("FATAL: This browser does not support HLS playback.");
        }
    }

    function setupHlsJs() {
        log("Starting HLS.js engine...");
        
        const hls = new Hls({
            // These settings help bypass common server handshake issues
            xhrSetup: function(xhr, url) {
                xhr.withCredentials = false; // Prevents cookie/auth CORS issues
            },
            // Try to recover from small network hiccups automatically
            manifestLoadingMaxRetry: 4,
            levelLoadingMaxRetry: 4
        });

        hls.loadSource(videoSrc);
        hls.attachMedia(video);

        hls.on(Hls.Events.MANIFEST_PARSED, (event, data) => {
            log("Manifest loaded! " + data.levels.length + " qualities found.");
            
            // Reset selector
            selector.innerHTML = '<option value="-1">Auto (Adaptive)</option>';
            
            // Sort levels by height (highest first)
            const levels = data.levels;
            levels.forEach((level, index) => {
                const opt = document.createElement('option');
                opt.value = index;
                const name = level.height ? `${level.height}p` : `${Math.round(level.bitrate/1000)}k`;
                opt.text = name;
                selector.appendChild(opt);
            });

            video.play().catch(() => log("Autoplay blocked. User must click Play."));
        });

        hls.on(Hls.Events.ERROR, (event, data) => {
            if (data.fatal) {
                log(`FATAL ${data.type}: ${data.details}. Attempting recovery...`);
                if (data.type === Hls.ErrorTypes.NETWORK_ERROR) {
                    hls.startLoad();
                } else if (data.type === Hls.ErrorTypes.MEDIA_ERROR) {
                    hls.recoverMediaError();
                } else {
                    hls.destroy();
                    log("Unrecoverable error. Check CORS headers on server.");
                }
            }
        });

        // Quality Switcher logic
        selector.onchange = () => {
            log("Switching quality to index: " + selector.value);
            hls.currentLevel = parseInt(selector.value);
        };
    }
</script>

</body>
</html>
