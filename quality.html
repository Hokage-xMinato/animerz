<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate HLS Blob Player</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f0f0f; color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { width: 100%; max-width: 900px; background: #1e1e1e; padding: 20px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.7); }
        input { width: 80%; padding: 12px; border-radius: 5px; border: 1px solid #333; background: #111; color: #00ff00; margin-bottom: 10px; font-family: monospace; }
        .video-box { width: 100%; background: black; aspect-ratio: 16/9; margin: 20px 0; border-radius: 8px; overflow: hidden; }
        video { width: 100%; height: 100%; }
        .controls { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
        button { padding: 10px 25px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; background: #333; color: white; transition: 0.3s; }
        button:hover { background: #444; transform: translateY(-2px); }
        button.active { background: #007bff; box-shadow: 0 0 15px rgba(0,123,255,0.5); }
        .status { margin-top: 10px; font-size: 0.85em; color: #888; }
    </style>
</head>
<body>

<div class="container">
    <h2>Dynamic HLS Quality Switcher</h2>
    
    <input type="text" id="masterUrl" placeholder="Paste master.m3u8 link here..." 
           value="https://ca.netmagcdn.com:2228/hls-playback/.../master.m3u8">
    
    <div class="video-box">
        <video id="player" controls autoplay playsinline></video>
    </div>

    <div class="controls">
        <button onclick="changeQuality('f1', this)">1080p (Full HD)</button>
        <button onclick="changeQuality('f2', this)">720p (HD)</button>
        <button onclick="changeQuality('f3', this)">360p (SD)</button>
    </div>
    
    <div class="status" id="statusLog">Ready. Paste a link and select quality.</div>
</div>

<script>
    const video = document.getElementById('player');
    const statusLog = document.getElementById('statusLog');
    let activeBlob = null;

    function changeQuality(qualityCode, btn) {
        const inputUrl = document.getElementById('masterUrl').value.trim();
        
        if (!inputUrl.includes('master.m3u8')) {
            alert("Please paste a valid master.m3u8 URL");
            return;
        }

        // 1. Extract the Base URL by removing 'master.m3u8'
        const baseUrl = inputUrl.replace('master.m3u8', '');

        // 2. Build the specialized Manifest
        // Using f1/f2/f3 logic from your specific CDN structure
        const manifestText = `#EXTM3U
#EXT-X-VERSION:3
#EXT-X-STREAM-INF:BANDWIDTH=2000000,RESOLUTION=1920x1080
${baseUrl}index-${qualityCode}-v1-a1.m3u8`;

        // 3. Clean up memory
        if (activeBlob) URL.revokeObjectURL(activeBlob);

        // 4. Create Blob URL
        const blob = new Blob([manifestText], { type: 'application/x-mpegURL' });
        activeBlob = URL.createObjectURL(blob);

        // 5. Playback with position sync
        const currentTime = video.currentTime;
        video.src = activeBlob;
        
        video.onloadedmetadata = () => {
            video.currentTime = currentTime;
            video.play().catch(e => console.log("Autoplay blocked or error:", e));
        };

        // UI Feedback
        document.querySelectorAll('button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        statusLog.innerText = `Currently Streaming: ${qualityCode} via Blob Context`;
    }
</script>

</body>
</html>
