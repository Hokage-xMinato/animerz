<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Dynamic M3U8 Player</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <style>
    body { margin: 0; background: #000; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
    .container { width: 90%; max-width: 1000px; text-align: center; }
    video { width: 100%; border-radius: 8px; background: #111; }
    .controls { margin-top: 10px; display: flex; justify-content: center; gap: 10px; align-items: center; }
    select { padding: 5px; border-radius: 4px; background: #333; color: white; border: 1px solid #555; }
  </style>
</head>
<body>

<div class="container">
    <video id="video" controls autoplay></video>
    
    <div class="controls">
        <label>Stream Quality:</label>
        <select id="qualitySelect">
            <option value="-1">Auto (ABR)</option>
        </select>
    </div>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const videoSrc = params.get("url");
  const subsParam = params.get("subs");  
  const namesParam = params.get("names"); 
  const video = document.getElementById("video");
  const selector = document.getElementById("qualitySelect");

  if (!videoSrc) {
    document.body.innerHTML = "<h1>Error: No ?url= parameter found.</h1><p>Example: player.html?url=https://path/to/video.m3u8</p>";
    throw new Error("Missing url parameter");
  }

  // --- SUBTITLE BLOB LOGIC ---
  async function loadExternalSubs(url, label) {
    try {
      const response = await fetch(url);
      const text = await response.text();
      const blob = new Blob([text], { type: 'text/vtt' });
      const blobUrl = URL.createObjectURL(blob);
      
      const track = document.createElement("track");
      track.kind = "subtitles";
      track.label = label;
      track.src = blobUrl;
      track.srclang = "en";
      video.appendChild(track);
    } catch (e) {
      console.error("Subtitle fetch failed:", url);
    }
  }

  if (subsParam) {
    const urls = subsParam.split(",");
    const names = namesParam ? namesParam.split(",") : [];
    urls.forEach((url, index) => {
      loadExternalSubs(url, names[index] || `Subtitle ${index + 1}`);
    });
  }

  // --- HLS LOGIC WITH QUALITY SELECTOR ---
  if (Hls.isSupported()) {
    const hls = new Hls();
    hls.loadSource(videoSrc);
    hls.attachMedia(video);

    // Populate Qualities once manifest is parsed
    hls.on(Hls.Events.MANIFEST_PARSED, function (event, data) {
      // Clear and fill dropdown
      selector.innerHTML = '<option value="-1">Auto (ABR)</option>';
      data.levels.forEach((level, index) => {
        const opt = document.createElement('option');
        opt.value = index;
        // Label by height (720, 1080) or bitrate if height is missing
        opt.text = level.height ? `${level.height}p` : `${Math.round(level.bitrate/1000)}k`;
        selector.appendChild(opt);
      });
      video.play();
    });

    // Handle Manual Quality Change
    selector.onchange = () => {
      hls.currentLevel = parseInt(selector.value);
    };

  } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
    // Safari Fallback
    video.src = videoSrc;
  }
</script>

</body>
</html>
