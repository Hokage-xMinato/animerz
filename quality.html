<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HLS Blob Quality Player</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .video-container { width: 100%; max-width: 800px; background: #000; border-radius: 8px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        video { width: 100%; display: block; }
        .controls { margin-top: 20px; display: flex; gap: 10px; }
        button { padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; background: #333; color: white; font-weight: bold; transition: 0.2s; }
        button:hover { background: #444; }
        button.active { background: #007bff; }
        .info { margin-top: 15px; font-size: 0.9em; color: #888; }
    </style>
</head>
<body>

    <h2>HLS Quality Selector (Blob Method)</h2>

    <div class="video-container">
        <video id="my-video" controls autoplay playsinline></video>
    </div>

    <div class="controls">
        <button onclick="setQuality('f1', this)" id="btn-1080">1080p</button>
        <button onclick="setQuality('f2', this)" id="btn-720">720p</button>
        <button onclick="setQuality('f3', this)" id="btn-360">360p</button>
    </div>

    <div class="info" id="status">Status: Ready. Select a quality to begin.</div>

    <script>
        const video = document.getElementById('my-video');
        const status = document.getElementById('status');
        
        // --- CONFIGURATION ---
        // This is your base URL (everything before 'master.m3u8')
        const baseUrl = "https://dl.netmagcdn.com:2228/hls-playback/f7aea34d2bbe09b962858c9fefd4600b7f6dc326a95edd1cf5cb2075981004af85abcf2724596b251b7cd0cc21f2b885629ac97169e705f07a71c7c05ae50c0664b7244fe208cd7c2f16571ac0316680de41e5ef0b8f5ba5180c1ef2ceca0e623ee3a4b65f3820bae02c8cb738a51032955480ea41dec7f94794ecc80d5698b6059eca151ed955706531168763eae625/master.m3u8";
        
        let currentBlobUrl = null;

        function setQuality(qualityCode, btnElement) {
            // 1. Clean up old Blob to save memory
            if (currentBlobUrl) {
                URL.revokeObjectURL(currentBlobUrl);
            }

            // 2. Map codes to resolutions for the manifest
            const resMap = { 'f1': '1920x1080', 'f2': '1280x720', 'f3': '640x360' };
            const bandwidthMap = { 'f1': '1159248', 'f2': '612610', 'f3': '306353' };

            // 3. Construct the "Mini-Master" Manifest content
            // We point the index file to the ABSOLUTE URL on the CDN
            const manifestContent = `#EXTM3U
#EXT-X-VERSION:3
#EXT-X-STREAM-INF:BANDWIDTH=${bandwidthMap[qualityCode]},RESOLUTION=${resMap[qualityCode]}
${baseUrl}index-${qualityCode}-v1-a1.m3u8`;

            // 4. Create the Blob
            const blob = new Blob([manifestContent], { type: 'application/vnd.apple.mpegurl' });
            currentBlobUrl = URL.createObjectURL(blob);

            // 5. Apply to video tag
            const currentTime = video.currentTime; // Save current position
            video.src = currentBlobUrl;
            
            // Re-sync playback time after loading
            video.onloadedmetadata = () => {
                video.currentTime = currentTime;
                video.play();
            };

            // UI Updates
            document.querySelectorAll('button').forEach(b => b.classList.remove('active'));
            btnElement.classList.add('active');
            status.innerText = `Status: Playing ${resMap[qualityCode]} via Blob URL`;
            console.log("Active Blob:", currentBlobUrl);
        }
    </script>
</body>
</html>
