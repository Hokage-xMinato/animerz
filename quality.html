<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick HLS Test</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { font-family: system-ui, sans-serif; background: #121212; color: white; text-align: center; padding: 20px; }
        .player-card { background: #222; padding: 20px; border-radius: 12px; display: inline-block; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        video { width: 100%; max-width: 700px; border-radius: 4px; background: #000; }
        .controls { margin-top: 15px; display: flex; justify-content: center; align-items: center; gap: 10px; }
        select { padding: 8px; border-radius: 4px; background: #444; color: white; border: 1px solid #666; }
    </style>
</head>
<body>

    <div class="player-card">
        <h3>Stream Tester</h3>
        <video id="video" controls></video>
        
        <div class="controls">
            <span>Source Quality:</span>
            <select id="qualitySelect">
                <option value="-1">Auto (ABR)</option>
            </select>
        </div>
    </div>

    <script>
        const video = document.getElementById('video');
        const selector = document.getElementById('qualitySelect');
        
        // PASTE YOUR M3U8 LINK HERE
        const videoSrc = 'https://dt.netmagcdn.com:2228/hls-playback/f7aea34d2bbe09b962858c9fefd4600b7f6dc326a95edd1cf5cb2075981004af85abcf2724596b251b7cd0cc21f2b8850acdccb6cbec0c36dd90d7bd483722543d490fba70ed84e4b2c6f4fe94a8ff0ed0a0f9175df207c7e3189e093673769cbc8dd5b05b82637caf88749b24af9ee0288a7fbfb3711a2dbcb8a4e82f43b3a772364e2e1014740bde5f6fe60e23716d/master.m3u8';

        if (Hls.isSupported()) {
            const hls = new Hls();
            hls.loadSource(videoSrc);
            hls.attachMedia(video);

            hls.on(Hls.Events.MANIFEST_PARSED, (event, data) => {
                // Clear existing options except "Auto"
                selector.innerHTML = '<option value="-1">Auto (ABR)</option>';
                
                // Map available levels to the dropdown
                data.levels.forEach((level, index) => {
                    const opt = document.createElement('option');
                    opt.value = index;
                    opt.text = level.height ? `${level.height}p` : `Level ${index}`;
                    selector.appendChild(opt);
                });
                
                video.play().catch(() => console.log("Autoplay blocked; waiting for user interaction."));
            });

            // Manual Switch Logic
            selector.onchange = () => {
                hls.currentLevel = parseInt(selector.value);
            };

        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            // Fallback for Safari
            video.src = videoSrc;
        }
    </script>
</body>
</html>
