<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Fixed M3U8 Player</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { margin: 0; background: #000; color: #0f0; font-family: monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        .container { width: 90%; max-width: 800px; }
        video { width: 100%; border: 1px solid #333; background: #111; }
        #debug-log { background: #111; padding: 10px; height: 100px; overflow-y: auto; font-size: 12px; border: 1px solid #333; margin-top: 10px; width: 100%; }
        .controls { margin: 10px 0; color: white; font-family: sans-serif; }
    </style>
</head>
<body>

<div class="container">
    <video id="video" controls></video>
    
    <div class="controls">
        Quality: <select id="qualitySelect"><option>Loading...</option></select>
    </div>

    <div id="debug-log">Initialising...<br></div>
</div>

<script>
    const log = (msg) => { document.getElementById('debug-log').innerHTML += `> ${msg}<br>`; };

    window.onload = function() {
        const params = new URLSearchParams(window.location.search);
        const videoSrc = params.get("url");
        const video = document.getElementById("video");
        const selector = document.getElementById("qualitySelect");

        if (!videoSrc) {
            log("ERROR: No ?url= found in address bar!");
            return;
        }

        log("Attempting to load: " + videoSrc);

        if (Hls.isSupported()) {
            log("Hls.js is supported. Initialising...");
            const hls = new Hls({
                // This helps bypass some basic "no-loader" issues
                enableWorker: true,
                lowLatencyMode: true
            });

            hls.loadSource(videoSrc);
            hls.attachMedia(video);

            hls.on(Hls.Events.MANIFEST_PARSED, (event, data) => {
                log("Manifest parsed! Qualities found: " + data.levels.length);
                
                // Fill quality selector
                selector.innerHTML = '<option value="-1">Auto (Adaptive)</option>';
                data.levels.forEach((level, index) => {
                    const label = level.height ? `${level.height}p` : `${Math.round(level.bitrate/1000)}k`;
                    const opt = document.createElement('option');
                    opt.value = index;
                    opt.text = label;
                    selector.appendChild(opt);
                });

                video.play().catch(e => log("Autoplay blocked. Press Play."));
            });

            // Error Handling - THIS WILL TELL US WHY IT FAILS
            hls.on(Hls.Events.ERROR, (event, data) => {
                if (data.fatal) {
                    log("FATAL ERROR: " + data.type + " - " + data.details);
                    switch (data.type) {
                        case Hls.ErrorTypes.NETWORK_ERROR:
                            log("Network Error (CORS or 404). Check console.");
                            hls.startLoad();
                            break;
                        case Hls.ErrorTypes.MEDIA_ERROR:
                            log("Media Error. Recovering...");
                            hls.recoverMediaError();
                            break;
                        default:
                            hls.destroy();
                            break;
                    }
                }
            });

            selector.onchange = () => { hls.currentLevel = parseInt(selector.value); };

        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            log("Using native Safari player.");
            video.src = videoSrc;
        } else {
            log("HLS is not supported on this browser.");
        }
    };
</script>

</body>
</html>
